<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK WIN - Connecting...</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #01162e 0%, #000 100%);
            z-index: -2;
        }
        
        .particles {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(#ffcc00 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.2;
            animation: moveBg 30s linear infinite;
            z-index: -1;
        }

        .loading-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .logo-box {
            margin-bottom: 40px;
            position: relative;
        }

        .main-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 55px;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
            animation: glowPulse 2s infinite;
        }

        .logo-subtext {
            font-size: 11px;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
            margin-top: -5px;
        }

        .load-bar-bg {
            width: 100%;
            height: 6px;
            background: #111;
            border-radius: 10px;
            border: 1px solid #333;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .load-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffcc00);
            border-radius: 10px;
            box-shadow: 0 0 15px #ffcc00;
            animation: fillBar 4.5s forwards ease-in-out;
        }

        .status-text {
            color: #aaa;
            font-size: 13px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .yasir-credit {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #555;
            letter-spacing: 1px;
        }

        .yasir-name {
            color: #ffcc00;
            font-weight: 600;
        }

        @keyframes moveBg { 0% { background-position: 0 0; } 100% { background-position: 1000px 1000px; } }
        @keyframes glowPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="particles"></div>

    <div class="loading-container">
        <div class="logo-box">
            <h1 class="main-logo">KPK WIN</h1>
            <p class="logo-subtext">BEST ONLINE GAME 2026</p>
        </div>
        
        <div class="load-bar-bg">
            <div class="load-bar-fill"></div>
        </div>
        
        <div class="status-text" id="status-display">Connecting to server...</div>
    </div>

    <div class="yasir-credit">
        Developed by <span class="yasir-name">YASIR KHAN</span>
    </div>

    <script>
        const statusEl = document.getElementById('status-display');
        
        // Status updates
        setTimeout(() => { statusEl.innerText = "Checking connection..."; }, 1500);
        setTimeout(() => { statusEl.innerText = "Loading assets..."; }, 2500);
        setTimeout(() => { statusEl.innerText = "Welcome to KPK WIN!"; statusEl.style.color = "#ffcc00"; }, 3800);

        // Final Redirection to login.html
        setTimeout(() => {
            // Yeh line user ko login page par le jayegi
            window.location.href = "login.html"; 
        }, 4800);
    </script>

</body>
</html>
