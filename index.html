<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google SEO Ke Liye Title Aur Description -->
    <title>KPK WIN - Official Online Support & Gaming Portal</title>
    <meta name="description" content="Welcome to KPK WIN. Access your online dashboard, secure deposits, and withdrawals easily on our official platform.">
    <meta name="keywords" content="KPK WIN, kpkwin, kpk win online, login, yasir khan">

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="YAHAN_APNA_GOOGLE_CODE_PASTE_KAREIN" />

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=600;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- PEHLA LOADING (KPK WIN TEXT + STARS BACKGROUND) --- */
        #simple-loading {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; background: #000;
            overflow: hidden;
        }
        
        /* 1. KPK WIN Text Background (Teercha aur Moving) */
        .kpk-text-bg {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            color: rgba(255, 204, 0, 0.03); /* Halka yellow color */
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            line-height: 2.5;
            letter-spacing: 4px;
            word-wrap: break-word;
            user-select: none;
            pointer-events: none;
            transform: rotate(-15deg);
            animation: moveTextBg 25s linear infinite;
            z-index: 1;
        }

        /* 2. Star/Particles Background (Jo aapko pehle pasand tha) */
        .particles {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#ffcc00 1px, transparent 1px);
            background-size: 30px 30px; opacity: 0.2;
            animation: moveBg 30s linear infinite;
            z-index: 2; /* Yeh text ke upar layer banayega */
        }

        /* --- DOOSRA LOADING (IMAGE DESIGN) --- */
        #image-loading {
            position: absolute;
            width: 100%; height: 100%;
            display: none; 
            justify-content: center; align-items: center;
            z-index: 5;
        }
        .full-bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.jpg'); 
            background-size: cover; background-position: center;
        }
        .bg-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* Common Elements */
        .loading-container { text-align: center; width: 90%; max-width: 400px; z-index: 20; }
        .main-logo {
            font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900;
            color: #ffcc00; text-shadow: 0 0 25px rgba(255, 204, 0, 0.8);
            animation: glowPulse 2s infinite; margin-bottom: 10px;
        }
        .load-bar-bg {
            width: 100%; height: 6px; background: #111; border-radius: 10px;
            border: 1px solid #333; overflow: hidden; margin: 20px 0;
        }
        .load-bar-fill {
            width: 0%; height: 100%; background: #ffcc00;
            box-shadow: 0 0 15px #ffcc00;
        }
        .status-text { color: #ffcc00; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

        .yasir-credit {
            position: absolute; bottom: 20px; font-size: 12px; color: #555;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px;
            z-index: 30;
        }

        /* Animations */
        @keyframes moveTextBg {
            0% { transform: translate(0, 0) rotate(-15deg); }
            100% { transform: translate(-50px, -50px) rotate(-15deg); }
        }
        @keyframes moveBg { 0% { background-position: 0 0; } 100% { background-position: 1000px 1000px; } }
        @keyframes glowPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .fill-anim { animation: fillBar 2.5s forwards linear; }
        @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }

    </style>
</head>
<body>

    <div id="simple-loading">
        <!-- Dono background ab ek sath chalenge -->
        <div class="kpk-text-bg" id="text-watermark"></div>
        <div class="particles"></div>
        
        <div class="loading-container">
            <h1 class="main-logo">KPK WIN</h1>
            <p style="font-size: 11px; letter-spacing: 3px;">CONNECTING...</p>
            <div class="load-bar-bg"><div class="load-bar-fill fill-anim"></div></div>
            <div class="status-text">Establishing Connection...</div>
        </div>
    </div>

    <div id="image-loading">
        <div class="full-bg-image"></div>
        <div class="bg-overlay"></div>
        <div class="loading-container" style="margin-top: 250px;">
            <div class="load-bar-bg"><div class="load-bar-fill" id="second-bar"></div></div>
            <div id="image-status" class="status-text">LOADING ASSETS...</div>
        </div>
    </div>

    <div class="yasir-credit">
        Developed by <span style="color:#ffcc00; font-weight:600;">YASIR KHAN</span>
    </div>

    <script>
        // Automatic background text generator
        const bgWatermark = document.getElementById('text-watermark');
        let watermarkText = "";
        for (let i = 0; i < 400; i++) {
            watermarkText += "KPK WIN &nbsp;&nbsp;&nbsp;&nbsp; ";
        }
        bgWatermark.innerHTML = watermarkText;

        const simpleSection = document.getElementById('simple-loading');
        const imageSection = document.getElementById('image-loading');
        const imageStatus = document.getElementById('image-status');
        const secondBar = document.getElementById('second-bar');

        // Timings aur redirection
        setTimeout(() => {
            simpleSection.style.display = 'none';
            imageSection.style.display = 'flex';
            
            secondBar.classList.add('fill-anim');
            
            setTimeout(() => { imageStatus.innerText = "WELCOME TO KPK WIN!"; }, 1500);
            
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2500);

        }, 2600);
    </script>
</body>
</html>
