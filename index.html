<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK WIN - Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- PEHLA LOADING (SIMPLE) --- */
        #simple-loading {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; background: #000;
        }
        .particles {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#ffcc00 1px, transparent 1px);
            background-size: 30px 30px; opacity: 0.2;
            animation: moveBg 30s linear infinite;
        }

        /* --- DOOSRA LOADING (IMAGE DESIGN) --- */
        #image-loading {
            position: absolute;
            width: 100%; height: 100%;
            display: none; /* Shuru mein chhupa hoga */
            justify-content: center; align-items: center;
            z-index: 5;
        }
        .full-bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.jpg'); /* Aapki image file */
            background-size: cover; background-position: center;
        }
        .bg-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* Common Elements */
        .loading-container { text-align: center; width: 90%; max-width: 400px; z-index: 20; }
        .main-logo {
            font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900;
            color: #ffcc00; text-shadow: 0 0 25px rgba(255, 204, 0, 0.8);
            animation: glowPulse 2s infinite; margin-bottom: 10px;
        }
        .load-bar-bg {
            width: 100%; height: 6px; background: #111; border-radius: 10px;
            border: 1px solid #333; overflow: hidden; margin: 20px 0;
        }
        .load-bar-fill {
            width: 0%; height: 100%; background: #ffcc00;
            box-shadow: 0 0 15px #ffcc00;
        }
        .status-text { color: #ffcc00; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

        .yasir-credit {
            position: absolute; bottom: 20px; font-size: 12px; color: #555;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px;
        }

        /* Animations */
        @keyframes moveBg { 0% { background-position: 0 0; } 100% { background-position: 1000px 1000px; } }
        @keyframes glowPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .fill-anim { animation: fillBar 2.5s forwards linear; }
        @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }

    </style>
</head>
<body>

    <div id="simple-loading">
        <div class="particles"></div>
        <div class="loading-container">
            <h1 class="main-logo">KPK WIN</h1>
            <p style="font-size: 11px; letter-spacing: 3px;">CONNECTING...</p>
            <div class="load-bar-bg"><div class="load-bar-fill fill-anim"></div></div>
            <div class="status-text">Establishing Connection...</div>
        </div>
    </div>

    <div id="image-loading">
        <div class="full-bg-image"></div>
        <div class="bg-overlay"></div>
        <div class="loading-container" style="margin-top: 250px;">
            <div class="load-bar-bg"><div class="load-bar-fill" id="second-bar"></div></div>
            <div id="image-status" class="status-text">LOADING ASSETS...</div>
        </div>
    </div>

    <div class="yasir-credit">
        Developed by <span style="color:#ffcc00; font-weight:600;">YASIR KHAN</span>
    </div>

    <script>
        const simpleSection = document.getElementById('simple-loading');
        const imageSection = document.getElementById('image-loading');
        const imageStatus = document.getElementById('image-status');
        const secondBar = document.getElementById('second-bar');

        // 2.5 seconds baad pehla screen khatam hoga aur doosra shuru hoga
        setTimeout(() => {
            simpleSection.style.display = 'none';
            imageSection.style.display = 'flex';
            
            // Doosre bar ki animation shuru karein
            secondBar.classList.add('fill-anim');
            
            setTimeout(() => { imageStatus.innerText = "WELCOME TO KPK WIN!"; }, 1500);
            
            // Final redirection login page par
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2500);

        }, 2600);
    </script>
</body>
</html>
