<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Tower Blast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* --- UI UPDATES --- */
        body { 
            margin: 0; 
            background: #071511; /* Darker background as per screenshot */
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; 
            height: 100vh; 
        }
        
        header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px; 
            background: #0f1c18; 
            border-bottom: 2px solid #ff9900; 
            box-sizing: border-box; 
            position: fixed; /* Fixed top par rahega */
            top: 0; 
            left: 0;
            z-index: 2000; /* Sabse upar */
            height: 60px;
        }

        /* Balance Box: Black background with Orange Border/Text */
        .balance-box { 
            color: #ff9900; 
            background: #000; 
            font-weight: 900; 
            border: 1.5px solid #ff9900; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 14px; 
        }

        .back-btn { 
            background: #163026; 
            color: #ff9900; 
            border: 1px solid #ff9900; 
            padding: 5px 12px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 12px; 
        }

        .game-area-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            margin-top: 65px; /* Header ke liye jagah */
            flex-grow: 1; 
            overflow: hidden; 
        }

        .mode-selector { display: flex; gap: 4px; width: 92%; flex-shrink: 0; padding: 10px 0; }
        .mode-btn { 
            flex: 1; padding: 8px; border: 1px solid #244d3d; 
            background: #0f1c18; color: #7f9b94; cursor: pointer; 
            border-radius: 5px; font-size: 11px; font-weight: bold; 
        }
        .mode-btn.active { border-color: #ff9900; color: #ff9900; background: rgba(255,153,0,0.1); }

        .target-text { color:#ff9900; font-weight:bold; font-size: 14px; margin: 5px 0; }

        .scroll-container { 
            width: 100%; 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column-reverse; 
            align-items: center; 
            padding: 10px 0; 
            background: rgba(0,0,0,0.2);
        }

        .game-container { width: 92%; max-width: 350px; display: flex; flex-direction: column-reverse; gap: 8px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; opacity: 0.3; pointer-events: none; padding: 4px 0; }
        .row.active { opacity: 1; pointer-events: auto; }
        
        /* White Boxes as requested */
        .cell { 
            height: 42px; 
            background: #ffffff; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            border: 1px solid #ddd; 
            position: relative; 
            color: #333;
        }
        .cell.clicked { background: #ff9900; color: black; font-weight: bold; }
        .cell.bomb { background: #e74c3c; color: white; }
        .lvl-num { position: absolute; left: 5px; top: 2px; font-size: 9px; opacity: 0.5; color: #000; }

        /* CONTROLS */
        .controls { 
            width: 100%; 
            background: #0f1c18; 
            padding: 15px; 
            border-top: 2px solid #ff9900; 
            box-sizing: border-box; 
            flex-shrink: 0;
            z-index: 1500;
        }
        
        .bet-input-row { display: flex; align-items: stretch; gap: 8px; margin-bottom: 10px; height: 48px; }
        .adjust-btn { width: 50px; background: #163026; color: #ff9900; border: 1.5px solid #ff9900; border-radius: 8px; font-weight: bold; font-size: 24px; cursor: pointer; }
        input[type=number] { flex: 1; background: #000; border: 1px solid #163026; color: #ff9900; border-radius: 8px; text-align: center; font-weight: bold; outline: none; font-size: 22px; }
        
        .quick-bet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .q-btn { padding: 10px 0; background: #163026; border: 1px solid #244d3d; color: #fff; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 18px; background: #ff9900; color: black; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" onclick="location.href='index.html'">← BACK</button>
    <div class="balance-box">Rs <span id="userBal">0.00</span></div>
</header>

<div class="game-area-wrapper">
    <div class="mode-selector">
        <button class="mode-btn active" id="btn-easy" onclick="setMode('easy')">EASY</button>
        <button class="mode-btn" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
        <button class="mode-btn" id="btn-strong" onclick="setMode('strong')">STRONG</button>
    </div>

    <div id="displayMult" class="target-text">TARGET: 1.00x</div>
    
    <div class="scroll-container" id="scrollBox">
        <div class="game-container" id="board"></div>
    </div>

    <div class="controls">
        <div class="bet-input-row">
            <button class="adjust-btn" onclick="adjustBet(-10)">-</button>
            <input type="number" id="betAmount" value="50">
            <button class="adjust-btn" onclick="adjustBet(10)">+</button>
        </div>

        <div class="quick-bet-grid">
            <button class="q-btn" onclick="setBet(10)">10</button>
            <button class="q-btn" onclick="setBet(50)">50</button>
            <button class="q-btn" onclick="setBet(100)">100</button>
            <button class="q-btn" onclick="setBet(500)">500</button>
            <button class="q-btn" onclick="setBet(1000)">1000</button>
            <button class="q-btn" onclick="setBet(2000)">2000</button>
            <button class="q-btn" onclick="setBet(5000)">5000</button>
            <button class="q-btn" style="color:#ff4d4d;" onclick="setBet('max')">MAX</button>
        </div>

        <button id="startBtn" class="main-btn" onclick="startGame()">Start Game</button>
        <button id="cashBtn" class="main-btn" style="background:#2ecc71; color:white; display:none;" onclick="cashout()">Cash Out</button>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA",
        databaseURL: "https://kpk-win-default-rtdb.firebaseio.com",
        projectId: "kpk-win"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = sessionStorage.getItem('currentUserId') || localStorage.getItem('activeUser');
    let userBalance = 0;
    let currentLvl = 0;
    let currentMode = 'easy';
    const totalRows = 30; // 30 Rows set as requested

    const modes = {
        easy: { start: 1.2, step: 0.35, bombChance: 0.35 },
        normal: { start: 1.5, step: 0.9, bombChance: 0.55 },
        strong: { start: 2.0, step: 1.8, bombChance: 0.82 } 
    };

    function getMult(lvl) {
        let m = modes[currentMode];
        return (m.start + (lvl * m.step)).toFixed(2);
    }

    if(currentUser) {
        db.ref('users/' + currentUser + '/balance').on('value', snap => {
            userBalance = parseFloat(snap.val() || 0);
            document.getElementById('userBal').innerText = userBalance.toLocaleString('en-IN', {minimumFractionDigits: 2});
        });
    }

    function adjustBet(val) {
        let b = parseFloat(document.getElementById('betAmount').value) || 0;
        let res = Math.max(10, Math.min(5000, b + val));
        document.getElementById('betAmount').value = res;
    }

    function setBet(amt) {
        if(amt === 'max') {
            document.getElementById('betAmount').value = userBalance > 5000 ? 5000 : Math.floor(userBalance);
        } else {
            document.getElementById('betAmount').value = amt;
        }
    }

    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        document.getElementById('displayMult').innerText = "TARGET: " + getMult(0) + "x";
    }

    const board = document.getElementById('board');
    for (let i = 0; i < totalRows; i++) {
        let row = document.createElement('div');
        row.className = 'row'; row.id = 'r-' + i;
        for (let j = 0; j < 3; j++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<span class="lvl-num">${i+1}</span>`;
            cell.onclick = () => step(i, j);
            row.appendChild(cell);
        }
        board.appendChild(row);
    }

    function startGame() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (userBalance < bet || bet < 10) { alert("Paisa check karein!"); return; }

        db.ref('users/' + currentUser + '/balance').transaction(b => (b || 0) - bet);
        currentLvl = 0;
        document.querySelectorAll('.cell').forEach(c => { 
            c.classList.remove('clicked', 'bomb');
            c.innerText = '';
            let span = document.createElement('span');
            span.className = 'lvl-num';
            span.innerText = c.parentElement.id.split('-')[1] * 1 + 1;
            c.appendChild(span);
        });
        document.getElementById('startBtn').style.display = 'none';
        activate(0);
    }

    function activate(l) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        if (l < totalRows) {
            let activeRow = document.getElementById('r-' + l);
            activeRow.classList.add('active');
            document.getElementById('displayMult').innerText = "Multiplier: " + getMult(l) + "x";
            activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function step(r, c) {
        if (r !== currentLvl) return;
        let isBomb = Math.random() < modes[currentMode].bombChance;
        let cells = document.getElementById('r-' + r).children;

        if (isBomb) {
            cells[c].classList.add('bomb'); cells[c].innerText = '💣';
            setTimeout(() => { alert("Blast!"); reset(); }, 300);
        } else {
            cells[c].classList.add('clicked'); cells[c].innerText = '⭐';
            currentLvl++;
            document.getElementById('cashBtn').style.display = 'block';
            let pot = document.getElementById('betAmount').value * getMult(r);
            document.getElementById('cashBtn').innerText = "CASH OUT (Rs " + pot.toFixed(0) + ")";
            if (currentLvl === totalRows) cashout();
            else activate(currentLvl);
        }
    }

    function cashout() {
        if(currentLvl === 0) return;
        let win = document.getElementById('betAmount').value * getMult(currentLvl - 1);
        db.ref('users/' + currentUser + '/balance').transaction(b => (b || 0) + win);
        alert("Winner! Rs " + win.toFixed(2));
        reset();
    }

    function reset() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        document.getElementById('scrollBox').scrollTo({top: document.getElementById('scrollBox').scrollHeight, behavior: 'smooth'});
        document.getElementById('displayMult').innerText = "TARGET: " + getMult(0) + "x";
    }
</script>
</body>
</html>
