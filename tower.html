<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Tower Blast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #1a1b1e; color: white; 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; 
        }

        /* --- LOADING PAGE (Updated Background) --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Background image from your second screenshot */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('unnamed (1).webp'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s ease;
        }
        .bomb-blast-title { font-size: 32px; font-weight: 900; color: #ff4d4d; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255, 77, 77, 0.8); }
        .logo-yasir { font-size: 52px; font-weight: 900; letter-spacing: 12px; color: white; }
        .logo-kpk { font-size: 28px; font-weight: bold; color: #ffcc00; letter-spacing: 5px; margin-bottom: 30px; }
        .loading-bar-bg { width: 75%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .loading-bar-fill { width: 0%; height: 100%; background: #3b82f6; transition: width 0.1s; }

        /* --- TOP HEADER --- */
        header { 
            height: 50px; width: 100%; padding: 0 15px; background: #1a1b1e; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2d2f34; flex-shrink: 0;
        }
        .brand-logo { font-weight: 900; font-size: 16px; color: white; }
        .brand-logo span { color: #ffcc00; }
        .balance-box { background: #2d2f34; padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; border: 1px solid #3d3f46; color: #ffcc00; }

        /* --- NEW HISTORY BAR (As requested) --- */
        .history-bar {
            display: flex; gap: 8px; padding: 10px; background: #141518;
            overflow-x: auto; border-bottom: 1px solid #2d2f34; white-space: nowrap;
        }
        .hist-item {
            background: #2d2f34; padding: 5px 12px; border-radius: 4px;
            font-size: 12px; font-weight: bold; color: #ffcc00; border: 1px solid #3d3f46;
        }

        /* --- GAME SECTION --- */
        .game-area-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }

        .mode-container { display: flex; gap: 5px; padding: 10px; background: #1a1b1e; justify-content: center; }
        .mode-btn { flex: 1; padding: 8px; background: #2d2f34; border: 1px solid #3d3f46; color: #94a3b8; border-radius: 6px; font-weight: bold; font-size: 11px; }
        .mode-btn.active { border-color: #ffcc00; color: #ffcc00; background: rgba(255,204,0,0.1); }

        .multiplier-tabs {
            display: flex; gap: 6px; padding: 5px 10px; background: #1a1b1e;
            overflow-x: auto; border-top: 1px solid #2d2f34; flex-shrink: 0;
        }
        .m-tab {
            min-width: 75px; background: #2d2f34; padding: 8px; border-radius: 6px;
            text-align: center; font-size: 11px; border: 1px solid #3d3f46;
        }
        .m-tab span { display: block; font-weight: bold; color: #ffcc00; font-size: 12px; margin-top: 2px; }

        .scroll-container { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; 
            align-items: center; padding: 20px 0 180px 0; scroll-behavior: smooth;
        }
        .game-board { width: 92%; max-width: 360px; display: flex; flex-direction: column-reverse; gap: 10px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; opacity: 0.2; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }
        .cell { 
            height: 55px; background: #2d2f34; border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 16px; border: 1px solid #3d3f46; color: rgba(255,255,255,0.1); 
        }
        .cell.clicked { background: #3b82f6 !important; border-color: #60a5fa; color: white; }
        .cell.bomb { background: #ef4444 !important; border-color: #f87171; }

        /* --- FOOTER CONTROLS --- */
        .footer-controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #1f2024; border-top: 2px solid #2d2f34; 
            padding: 10px 15px 30px 15px; z-index: 100;
        }

        .quick-amounts { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
        .q-btn { 
            background: #2d2f34; border: 1px solid #3d3f46; color: white; 
            padding: 8px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; 
        }

        .bet-container { display: flex; gap: 10px; align-items: stretch; }
        .amount-input-box { 
            flex: 1.2; background: #2d2f34; border-radius: 8px; padding: 5px 12px;
            border: 1px solid #3d3f46;
        }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .input-row { display: flex; align-items: center; justify-content: space-between; }
        .input-row input { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: 60%; outline: none; }
        .plus-minus { display: flex; gap: 15px; color: #ffcc00; font-size: 20px; font-weight: bold; cursor: pointer; }

        .btn-main { 
            flex: 1; border: none; border-radius: 8px; color: white; 
            font-weight: 900; font-size: 18px; cursor: pointer;
        }
        #startBtn { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
        #cashBtn { background: #10b981; box-shadow: 0 4px 0 #047857; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="bomb-blast-title">💣 BOMB BLAST 💣</div>
    <div class="logo-yasir">Y---R</div>
    <div class="logo-kpk">KPK WIN</div>
    <div class="loading-bar-bg"><div class="loading-bar-fill" id="loadFill"></div></div>
</div>

<header>
    <div class="brand-logo">KPK <span>WIN</span> × BOMB BLAST</div>
    <div class="balance-box">Rs <span id="userBal">0.00</span></div>
</header>

<div class="game-area-wrapper">
    <div class="history-bar" id="gameHistory">
        <div class="hist-item">1.00x ⭐</div>
        <div class="hist-item">2.31x ⭐</div>
        <div class="hist-item">1.00x ⭐</div>
        <div class="hist-item">5.42x ⭐</div>
        <div class="hist-item">1.00x ⭐</div>
    </div>

    <div class="mode-container">
        <button class="mode-btn active" id="m-easy" onclick="setMode('easy')">EASY</button>
        <button class="mode-btn" id="m-normal" onclick="setMode('normal')">NORMAL</button>
        <button class="mode-btn" id="m-strong" onclick="setMode('strong')">STRONG</button>
    </div>

    <div class="scroll-container" id="scrollBox">
        <div class="game-board" id="board"></div>
    </div>

    <div class="multiplier-tabs" id="multTabs"></div>

    <div class="footer-controls">
        <div class="quick-amounts">
            <button class="q-btn" onclick="setBet(100)">100</button>
            <button class="q-btn" onclick="setBet(200)">200</button>
            <button class="q-btn" onclick="setBet(500)">500</button>
            <button class="q-btn" onclick="setBet(1000)">1000</button>
            <button class="q-btn" onclick="setBet(2000)">2000</button>
        </div>

        <div class="bet-container">
            <div class="amount-input-box">
                <div class="label">Amount</div>
                <div class="input-row">
                    <input type="number" id="betAmount" value="50">
                    <div class="plus-minus">
                        <span onclick="adjustBet(-10)">−</span>
                        <span onclick="adjustBet(10)">+</span>
                    </div>
                </div>
            </div>
            <button id="startBtn" class="btn-main" onclick="startGame()">BET ⭐</button>
            <button id="cashBtn" class="btn-main" style="display:none;" onclick="cashout()">CASHOUT</button>
        </div>
    </div>
</div>

<script>
    // --- LOADING ---
    let progress = 0;
    const loadInt = setInterval(() => {
        progress += 5;
        document.getElementById('loadFill').style.width = progress + '%';
        if(progress >= 100) {
            clearInterval(loadInt);
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        }
    }, 100);

    // --- GAME LOGIC ---
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com", projectId: "kpk-win" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = sessionStorage.getItem('currentUserId') || localStorage.getItem('activeUser');
    let balance = 0; let currentLvl = 0; let currentMode = 'easy';

    db.ref('users/' + currentUser + '/balance').on('value', snap => {
        balance = parseFloat(snap.val() || 0);
        document.getElementById('userBal').innerText = balance.toLocaleString();
    });

    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + m).classList.add('active');
    }

    function setBet(amt) { document.getElementById('betAmount').value = amt; }
    function adjustBet(v) { let b = document.getElementById('betAmount'); b.value = Math.max(10, parseInt(b.value) + v); }

    const board = document.getElementById('board');
    for (let i = 0; i < 30; i++) {
        let row = document.createElement('div'); row.className = 'row'; row.id = 'r-' + i;
        for (let j = 0; j < 3; j++) {
            let cell = document.createElement('div'); cell.className = 'cell';
            cell.innerHTML = '★'; // Star icon like screenshot
            cell.onclick = () => step(i, j);
            row.appendChild(cell);
        }
        board.appendChild(row);
    }

    const tabs = document.getElementById('multTabs');
    for(let i=0; i<15; i++) {
        let mult = (1.00 + (i * 0.31)).toFixed(2);
        tabs.innerHTML += `<div class="m-tab">${i+1} ⭐ <span>x${mult}</span></div>`;
    }

    function startGame() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (balance < bet) return alert("Low Balance!");
        db.ref('users/' + currentUser + '/balance').transaction(b => b - bet);
        currentLvl = 0;
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('clicked', 'bomb');
            c.innerHTML = '★';
        });
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('cashBtn').style.display = 'block';
        document.getElementById('cashBtn').innerText = "CASHOUT";
        activateRow(0);
    }

    function activateRow(l) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        if (l < 30) {
            let target = document.getElementById('r-' + l);
            target.classList.add('active');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function step(r, c) {
        if (r !== currentLvl) return;
        let prob = currentMode === 'easy' ? 0.3 : (currentMode === 'normal' ? 0.45 : 0.6);
        
        if (Math.random() < prob) {
            let cell = document.getElementById('r-' + r).children[c];
            cell.classList.add('bomb');
            cell.innerHTML = '💣';
            setTimeout(() => { alert("BOMB! Try Again."); resetGame(); }, 200);
        } else {
            let cell = document.getElementById('r-' + r).children[c];
            cell.classList.add('clicked');
            cell.innerHTML = '✔';
            currentLvl++;
            let mult = (1.00 + ((currentLvl-1) * 0.31)).toFixed(2);
            document.getElementById('cashBtn').innerText = "CASHOUT (x" + mult + ")";
            activateRow(currentLvl);
        }
    }

    function cashout() {
        let mult = (1.00 + ((currentLvl-1) * 0.31));
        let win = document.getElementById('betAmount').value * mult;
        db.ref('users/' + currentUser + '/balance').transaction(b => b + win);
        
        // Add to history UI
        let hist = document.getElementById('gameHistory');
        let newItem = document.createElement('div');
        newItem.className = 'hist-item';
        newItem.innerText = mult.toFixed(2) + 'x ⭐';
        hist.prepend(newItem);
        
        resetGame();
    }

    function resetGame() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
    }
</script>
</body>
</html>
