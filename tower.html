<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Tower Blast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            margin: 0; background: #1a1b1e; color: white; 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        /* --- HEADER (Very Compact) --- */
        header { 
            width: 100%; padding: 5px 10px; background: #1a1b1e; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2d2f34; box-sizing: border-box;
        }
        .brand-title { font-weight: 900; font-size: 14px; color: #ffffff; }
        .brand-title span { color: #ffcc00; }
        .balance-display { background: #2d2f34; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }

        .game-area-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; align-items: center; }

        /* --- MODES (Top - No Margin) --- */
        .mode-strip-top { width: 96%; display: flex; gap: 4px; margin: 5px 0; }
        .m-btn { 
            flex: 1; background: #2d2f34; border: 1px solid #3d3f46; 
            color: #94a3b8; padding: 6px 0; border-radius: 4px; 
            font-size: 10px; font-weight: bold;
        }
        .m-btn.active { border-color: #ffcc00; color: #ffcc00; background: rgba(255,204,0,0.1); }

        .top-stats { width: 96%; display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-box { font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 3px; }

        /* --- GRID AREA --- */
        .scroll-container { width: 100%; flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; align-items: center; }
        .game-container { width: 96%; max-width: 320px; display: flex; flex-direction: column-reverse; gap: 4px; padding-bottom: 5px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; opacity: 0.3; }
        .row.active { opacity: 1; }
        .cell { height: 35px; background: #2d2f34; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid #3d3f46; color: rgba(255,255,255,0.1); }
        .cell.clicked { background: #3b82f6; color: white; border-color: #60a5fa; }
        .cell.bomb { background: #ef4444; color: white; }

        /* --- MULTIPLIER BAR --- */
        .history-bar { width: 100%; display: flex; gap: 4px; overflow-x: auto; padding: 5px; background: #1a1b1e; border-top: 1px solid #2d2f34; }
        .hist-item { min-width: 55px; background: #2d2f34; padding: 3px; border-radius: 4px; text-align: center; font-size: 9px; color: #94a3b8; }
        .hist-item b { display: block; color: white; font-size: 10px; }

        /* --- CONTROLS (Fixed Bottom - Reduced Height) --- */
        .controls { width: 100%; background: #1a1b1e; padding: 5px 10px 10px 10px; border-top: 1px solid #2d2f34; box-sizing: border-box; }
        .bet-box-container { display: flex; gap: 6px; align-items: stretch; height: 45px; }
        .input-area { flex: 1; background: #2d2f34; border-radius: 6px; padding: 2px 8px; display: flex; flex-direction: column; justify-content: center; }
        .input-label { font-size: 8px; color: #94a3b8; }
        .input-row { display: flex; align-items: center; justify-content: space-between; }
        .input-row input { background: transparent; border: none; color: white; font-size: 14px; font-weight: bold; width: 40%; outline: none; }
        .adj-btns { display: flex; gap: 12px; color: #94a3b8; font-size: 18px; cursor: pointer; }

        .bet-btn { flex: 1; background: #3b82f6; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="brand-title">KPK <span>WIN</span></div>
    <div class="balance-display">Rs <span id="userBal">0.00</span></div>
</header>

<div class="game-area-wrapper">
    <div class="mode-strip-top">
        <button class="m-btn active" id="btn-easy" onclick="setMode('easy')">EASY</button>
        <button class="m-btn" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
        <button class="m-btn" id="btn-strong" onclick="setMode('strong')">STRONG</button>
    </div>

    <div class="top-stats">
        <div class="stat-box" style="color:#3b82f6;">⭐ <span id="starCount">1</span></div>
        <div class="stat-box" style="color:#ef4444;">💣 <span id="bombCount">2</span></div>
    </div>

    <div class="scroll-container" id="scrollBox">
        <div class="game-container" id="board"></div>
    </div>

    <div class="history-bar" id="historyBar"></div>

    <div class="controls">
        <div class="bet-box-container">
            <div class="input-area">
                <div class="input-label">Amount</div>
                <div class="input-row">
                    <input type="number" id="betAmount" value="50">
                    <div class="adj-btns">
                        <span onclick="adjustBet(-10)">−</span>
                        <span onclick="adjustBet(10)">+</span>
                    </div>
                </div>
            </div>
            <button id="startBtn" class="bet-btn" onclick="startGame()">Bet ⭐</button>
            <button id="cashBtn" class="bet-btn" style="background:#10b981; display:none;" onclick="cashout()">Cash Out</button>
        </div>
    </div>
</div>

<script>
    // Firebase and Game Logic remains same as previous version
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com", projectId: "kpk-win" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = sessionStorage.getItem('currentUserId') || localStorage.getItem('activeUser');
    let userBalance = 0; let currentLvl = 0; let currentMode = 'easy';
    const totalRows = 30;

    const config = {
        easy: { start: 1.0, end: 10.0, bombProb: 0.3 },
        normal: { start: 1.5, end: 15.0, bombProb: 0.5 },
        strong: { start: 1.3, end: 30.0, bombProb: 0.6 }
    };

    function getMult(lvl) {
        let conf = config[currentMode];
        return (conf.start + (lvl * (conf.end - conf.start) / 29)).toFixed(2);
    }

    if(currentUser) {
        db.ref('users/' + currentUser + '/balance').on('value', snap => {
            userBalance = parseFloat(snap.val() || 0);
            document.getElementById('userBal').innerText = userBalance.toFixed(2);
        });
    }

    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        renderHistory();
    }

    function renderHistory() {
        const bar = document.getElementById('historyBar');
        bar.innerHTML = '';
        for(let i=0; i<6; i++) bar.innerHTML += `<div class="hist-item">${i+1} ⭐ <b>x${getMult(i)}</b></div>`;
    }

    const board = document.getElementById('board');
    for (let i = 0; i < totalRows; i++) {
        let row = document.createElement('div'); row.className = 'row'; row.id = 'r-' + i;
        for (let j = 0; j < 3; j++) {
            let cell = document.createElement('div'); cell.className = 'cell';
            cell.innerHTML = `<span>${i+1}</span>`;
            cell.onclick = () => step(i, j);
            row.appendChild(cell);
        }
        board.appendChild(row);
    }

    function startGame() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (userBalance < bet || bet < 10) return alert("Low Balance!");
        db.ref('users/' + currentUser + '/balance').transaction(b => b - bet);
        currentLvl = 0;
        document.querySelectorAll('.cell').forEach(c => { c.classList.remove('clicked', 'bomb'); c.innerText = c.parentElement.id.split('-')[1]*1+1; });
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('cashBtn').style.display = 'block';
        activate(0);
    }

    function activate(l) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        if (l < totalRows) {
            let target = document.getElementById('r-' + l);
            target.classList.add('active');
            document.getElementById('scrollBox').scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
        }
    }

    function step(r, c) {
        if (r !== currentLvl) return;
        let isBomb = Math.random() < config[currentMode].bombProb;
        let cells = document.getElementById('r-' + r).children;
        if (isBomb) {
            cells[c].classList.add('bomb'); cells[c].innerText = '💣';
            setTimeout(() => { alert("Blast!"); reset(); }, 300);
        } else {
            cells[c].classList.add('clicked'); cells[c].innerText = '⭐';
            currentLvl++;
            let win = document.getElementById('betAmount').value * getMult(r);
            document.getElementById('cashBtn').innerText = "Cashout " + Math.floor(win);
            if (currentLvl === totalRows) cashout(); else activate(currentLvl);
        }
    }

    function cashout() {
        let win = document.getElementById('betAmount').value * getMult(currentLvl - 1);
        db.ref('users/' + currentUser + '/balance').transaction(b => b + win);
        alert("Won: Rs " + win.toFixed(2)); reset();
    }

    function reset() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
    }

    function adjustBet(v) {
        let b = document.getElementById('betAmount');
        b.value = Math.max(10, parseInt(b.value) + v);
    }
    renderHistory();
</script>
</body>
</html>
