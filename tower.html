<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Tower Blast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            margin: 0; background: #1a1b1e; color: white; 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        /* --- LOADING PAGE STYLES --- */
        #loadingPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1e3a8a 0%, #1a1b1e 100%); 
            z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
            transition: opacity 0.5s ease;
        }
        .load-logo-yr { margin: 0; font-size: 55px; color: #ffffff; letter-spacing: 8px; font-weight: 900; }
        .load-logo-kpk { margin: 0; font-size: 22px; color: #ffcc00; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        .load-bar-container { width: 70%; max-width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 40px; }
        #loadProgress { width: 0%; height: 100%; background: #ffffff; box-shadow: 0 0 15px #ffffff; transition: width 0.1s linear; }

        /* --- GAME STYLES --- */
        header { 
            width: 100%; padding: 12px 10px; background: #1a1b1e; 
            display: flex; justify-content: flex-start; align-items: center;
            border-bottom: 1px solid #2d2f34; flex-shrink: 0; gap: 15px;
        }
        .brand-title { font-weight: 900; font-size: 18px; letter-spacing: 1px; color: #ffffff; }
        .brand-title span { color: #ffcc00; }
        .balance-display { background: #2d2f34; padding: 6px 10px; border-radius: 8px; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 4px; }
        .game-area-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; align-items: center; padding: 5px 0; }
        .top-stats { width: 90%; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stat-box { background: #2d2f34; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .scroll-container { width: 100%; flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 10px; }
        .game-container { width: 92%; max-width: 360px; display: flex; flex-direction: column-reverse; gap: 6px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; opacity: 0.3; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }
        .cell { height: 42px; background: #2d2f34; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid #3d3f46; transition: 0.2s; color: rgba(255,255,255,0.2); }
        .cell.clicked { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 0 12px rgba(59,130,246,0.4); }
        .cell.bomb { background: #ef4444; color: white; }
        .history-bar { width: 95%; display: flex; gap: 5px; overflow-x: auto; padding: 8px 0; border-top: 1px solid #2d2f34; flex-shrink: 0; }
        .hist-item { min-width: 65px; background: #2d2f34; padding: 4px; border-radius: 6px; text-align: center; font-size: 10px; color: #94a3b8; }
        .hist-item b { display: block; color: white; font-size: 11px; }
        .controls { width: 100%; background: #1a1b1e; padding: 12px; border-top: 1px solid #2d2f34; flex-shrink: 0; }
        .bet-box-container { display: flex; gap: 8px; align-items: stretch; }
        .input-area { flex: 1; background: #2d2f34; border-radius: 8px; padding: 6px; }
        .input-label { font-size: 10px; color: #94a3b8; margin-bottom: 2px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; }
        .input-row input { background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; width: 50%; outline: none; }
        .adj-btns { display: flex; gap: 8px; color: #94a3b8; font-size: 18px; cursor: pointer; }
        .bet-btn { flex: 1.2; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 3px 0 #2563eb; }
        .bet-btn:active { transform: translateY(2px); box-shadow: none; }
        .mode-strip { display: flex; gap: 5px; margin-top: 8px; }
        .m-btn { flex: 1; background: #2d2f34; border: 1px solid #3d3f46; color: #94a3b8; padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .m-btn.active { border-color: #ffcc00; color: #ffcc00; background: rgba(255,204,0,0.1); }
    </style>
</head>
<body>

<div id="loadingPage">
    <h1 class="load-logo-yr">Y---R</h1>
    <h2 class="load-logo-kpk">KPK WIN</h2>
    <div style="color: rgba(255,255,255,0.8); font-size: 40px; font-weight: 900; margin-top: 20px;">MINES</div>
    <div class="load-bar-container">
        <div id="loadProgress"></div>
    </div>
    <div id="loadPercent" style="color: #ffffff; font-size: 14px; margin-top: 10px; font-weight: bold; opacity: 0.7;">0%</div>
</div>

<header>
    <div class="brand-title">KPK <span>WIN</span> × MINES</div>
    <div class="balance-display">
        <span id="userBal">0.00</span> <span style="color:#94a3b8; font-size:11px;">PKR</span>
    </div>
</header>

<div class="game-area-wrapper">
    <div class="top-stats">
        <div class="stat-box" style="color:#3b82f6;">⭐ <span id="starCount">1</span></div>
        <div class="stat-box" style="color:#ef4444;">💣 <span id="bombCount">2</span></div>
    </div>
    <div class="scroll-container" id="scrollBox">
        <div class="game-container" id="board"></div>
    </div>
    <div class="history-bar" id="historyBar"></div>
    <div class="controls">
        <div class="bet-box-container">
            <div class="input-area">
                <div class="input-label">Amount</div>
                <div class="input-row">
                    <input type="number" id="betAmount" value="50">
                    <div class="adj-btns">
                        <span onclick="adjustBet(-10)">−</span>
                        <span onclick="adjustBet(10)">+</span>
                    </div>
                </div>
            </div>
            <button id="startBtn" class="bet-btn" onclick="startGame()">Bet ⭐</button>
            <button id="cashBtn" class="bet-btn" style="background:#10b981; box-shadow: 0 3px 0 #059669; display:none;" onclick="cashout()">Cash Out</button>
        </div>
        <div class="mode-strip">
            <button class="m-btn active" id="btn-easy" onclick="setMode('easy')">EASY</button>
            <button class="m-btn" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="m-btn" id="btn-strong" onclick="setMode('strong')">STRONG</button>
        </div>
    </div>
</div>

<script>
    // --- LOADING LOGIC ---
    window.addEventListener('load', function() {
        let progress = 0;
        let progressBar = document.getElementById('loadProgress');
        let progressText = document.getElementById('loadPercent');
        let interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 2;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loadingPage').style.opacity = '0';
                    setTimeout(() => { document.getElementById('loadingPage').style.display = 'none'; }, 500);
                }, 500);
            }
            progressBar.style.width = progress + '%';
            progressText.innerText = progress + '%';
        }, 60);
    });

    const firebaseConfig = {
        apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA",
        databaseURL: "https://kpk-win-default-rtdb.firebaseio.com",
        projectId: "kpk-win"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = sessionStorage.getItem('currentUserId') || localStorage.getItem('activeUser');
    let userBalance = 0;
    let currentLvl = 0;
    let currentMode = 'easy';
    const totalRows = 30;

    const config = {
        easy: { start: 1.0, end: 10.0, bombProb: 0.90 },
        normal: { start: 1.5, end: 15.0, bombProb: 0.90 },
        strong: { start: 1.3, end: 30.0, bombProb: 0.90 }
    };

    function getMult(lvl) {
        let conf = config[currentMode];
        let step = (conf.end - conf.start) / (totalRows - 1);
        return (conf.start + (lvl * step)).toFixed(2);
    }

    if(currentUser) {
        db.ref('users/' + currentUser + '/balance').on('value', snap => {
            userBalance = parseFloat(snap.val() || 0);
            document.getElementById('userBal').innerText = userBalance.toLocaleString('en-IN', {minimumFractionDigits: 2});
        });
    }

    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        renderHistory();
    }

    function renderHistory() {
        const bar = document.getElementById('historyBar');
        bar.innerHTML = '';
        for(let i=0; i<5; i++) {
            bar.innerHTML += `<div class="hist-item">${i+1} ⭐ <b>x${getMult(i)}</b></div>`;
        }
    }

    const board = document.getElementById('board');
    for (let i = 0; i < totalRows; i++) {
        let row = document.createElement('div');
        row.className = 'row'; row.id = 'r-' + i;
        for (let j = 0; j < 3; j++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<span>${i+1}</span>`;
            cell.onclick = () => step(i, j);
            row.appendChild(cell);
        }
        board.appendChild(row);
    }

    function startGame() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (userBalance < bet || bet < 10) { alert("Check Balance!"); return; }
        db.ref('users/' + currentUser + '/balance').transaction(b => (b || 0) - bet);
        currentLvl = 0;
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('clicked', 'bomb'));
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('cashBtn').style.display = 'block';
        activate(0);
    }

    function activate(l) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        if (l < totalRows) {
            document.getElementById('r-' + l).classList.add('active');
            document.getElementById('r-' + l).scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function step(r, c) {
        if (r !== currentLvl) return;
        let isBomb = Math.random() < config[currentMode].bombProb; 
        let cells = document.getElementById('r-' + r).children;

        if (isBomb) {
            cells[c].classList.add('bomb'); cells[c].innerText = '💣';
            setTimeout(() => { alert("Blast!"); reset(); }, 300);
        } else {
            cells[c].classList.add('clicked'); cells[c].innerText = '⭐';
            currentLvl++;
            let winPot = document.getElementById('betAmount').value * getMult(r);
            document.getElementById('cashBtn').innerText = "Cash Out Rs " + winPot.toFixed(0);
            if (currentLvl === totalRows) cashout();
            else activate(currentLvl);
        }
    }

    function cashout() {
        let win = document.getElementById('betAmount').value * getMult(currentLvl - 1);
        db.ref('users/' + currentUser + '/balance').transaction(b => (b || 0) + win);
        alert("Won: Rs " + win.toFixed(2));
        reset();
    }

    function reset() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        document.getElementById('scrollBox').scrollTo({top: document.getElementById('scrollBox').scrollHeight});
    }

    function adjustBet(v) {
        let b = parseFloat(document.getElementById('betAmount').value) || 0;
        document.getElementById('betAmount').value = Math.max(10, b + v);
    }

    renderHistory();
</script>
</body>
</html>
