<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Tower Blast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #1a1b1e; color: white; 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; 
        }

        /* --- LOADING PAGE STYLE --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s ease;
        }
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-Y---R { font-size: 42px; font-weight: 900; letter-spacing: 5px; color: white; margin-bottom: -5px; }
        .logo-kpk { font-size: 20px; font-weight: bold; color: #ffcc00; letter-spacing: 2px; }
        
        .loading-bar-bg { width: 70%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.1s; }
        .loading-text { margin-top: 10px; font-size: 12px; color: #94a3b8; font-weight: bold; }

        /* --- HEADER --- */
        header { 
            height: 45px; width: 100%; padding: 0 10px; background: #1a1b1e; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2d2f34; flex-shrink: 0;
        }
        .brand-title { font-weight: 900; font-size: 15px; }
        .brand-title span { color: #ffcc00; }
        .balance-display { background: #2d2f34; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; border: 1px solid #ffcc00; }

        /* --- GAME LAYOUT --- */
        .game-area-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; align-items: center; }
        .top-ui-section { width: 94%; flex-shrink: 0; padding-top: 5px; }
        .mode-strip-top { display: flex; gap: 5px; margin-bottom: 5px; }
        .m-btn { flex: 1; background: #2d2f34; border: 1px solid #3d3f46; color: #94a3b8; padding: 7px 0; border-radius: 5px; font-size: 10px; font-weight: bold; outline: none; }
        .m-btn.active { border-color: #ffcc00; color: #ffcc00; background: rgba(255,204,0,0.1); }

        .top-stats { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .stat-box { background: rgba(45,47,52,0.8); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }

        .scroll-container { 
            width: 100%; flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; 
            align-items: center; padding-top: 10px; padding-bottom: 130px; scroll-behavior: smooth;
        }
        .game-container { width: 94%; max-width: 350px; display: flex; flex-direction: column-reverse; gap: 6px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; opacity: 0.2; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }
        .cell { 
            height: 42px; background: #2d2f34; border-radius: 6px; display: flex; align-items: center; 
            justify-content: center; font-size: 14px; border: 1px solid #3d3f46; color: rgba(255,255,255,0.05); 
        }
        .cell.clicked { background: #3b82f6; color: white; border-color: #60a5fa; }
        .cell.bomb { background: #ef4444; color: white; border-color: #f87171; }

        /* --- FIXED BOTTOM CONTROLS --- */
        .controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: #1f2024; 
            padding: 10px 15px 25px 15px; border-top: 2px solid #2d2f34; display: flex; align-items: center; z-index: 100;
        }
        .bet-box-container { display: flex; gap: 10px; width: 100%; height: 100%; }
        .input-area { flex: 1.3; background: #2d2f34; border-radius: 8px; padding: 5px 10px; border: 1px solid #3d3f46; }
        .input-label { font-size: 10px; color: #94a3b8; }
        .input-row { display: flex; align-items: center; justify-content: space-between; }
        .input-row input { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: 50%; outline: none; }
        .adj-btns { display: flex; gap: 15px; color: #ffcc00; font-size: 22px; font-weight: bold; cursor: pointer; }

        .bet-btn { 
            flex: 1; background: #3b82f6; border: none; border-radius: 8px; color: white; 
            font-weight: 900; font-size: 18px; box-shadow: 0 4px 0 #1d4ed8; cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="logo-container">
        <div class="logo-Y---R">Y--R</div>
        <div class="logo-kpk">KPK WIN</div>
    </div>
    <div class="loading-bar-bg">
        <div class="loading-bar-fill" id="loadFill"></div>
    </div>
    <div class="loading-text" id="loadText">LOADING 0%</div>
</div>

<header>
    <div class="brand-title">KPK <span>WIN</span> × MINES</div>
    <div class="balance-display">Rs <span id="userBal">0.00</span></div>
</header>

<div class="game-area-wrapper">
    <div class="top-ui-section">
        <div class="mode-strip-top">
            <button class="m-btn active" id="btn-easy" onclick="setMode('easy')">EASY</button>
            <button class="m-btn" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="m-btn" id="btn-strong" onclick="setMode('strong')">STRONG</button>
        </div>
        <div class="top-stats">
            <div class="stat-box" style="color:#3b82f6;">⭐ STAR: <span id="starCount">1</span></div>
            <div class="stat-box" style="color:#ef4444;">💣 BOMB: <span id="bombCount">2</span></div>
        </div>
    </div>

    <div class="scroll-container" id="scrollBox">
        <div class="game-container" id="board"></div>
    </div>

    <div class="controls">
        <div class="bet-box-container">
            <div class="input-area">
                <div class="input-label">AMOUNT (PKR)</div>
                <div class="input-row">
                    <input type="number" id="betAmount" value="50">
                    <div class="adj-btns">
                        <span onclick="adjustBet(-10)">−</span>
                        <span onclick="adjustBet(10)">+</span>
                    </div>
                </div>
            </div>
            <button id="startBtn" class="bet-btn" onclick="startGame()">BET ⭐</button>
            <button id="cashBtn" class="bet-btn" style="background:#10b981; box-shadow: 0 4px 0 #047857; display:none;" onclick="cashout()">CASHOUT</button>
        </div>
    </div>
</div>

<script>
    // --- LOADING LOGIC ---
    let progress = 0;
    const fill = document.getElementById('loadFill');
    const txt = document.getElementById('loadText');
    const loadInt = setInterval(() => {
        progress += Math.floor(Math.random() * 10) + 2;
        if(progress >= 100) {
            progress = 100;
            clearInterval(loadInt);
            setTimeout(() => document.getElementById('loading-screen').style.opacity = '0', 500);
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
        }
        fill.style.width = progress + '%';
        txt.innerText = `LOADING ${progress}%`;
    }, 150);

    // --- GAME LOGIC (Keep Original) ---
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com", projectId: "kpk-win" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = sessionStorage.getItem('currentUserId') || localStorage.getItem('activeUser');
    let userBalance = 0; let currentLvl = 0; let currentMode = 'easy';
    const totalRows = 30;

    const config = {
        easy: { start: 1.0, end: 10.0, bombProb: 0.3 },
        normal: { start: 1.5, end: 15.0, bombProb: 0.5 },
        strong: { start: 1.3, end: 30.0, bombProb: 0.6 }
    };

    if(currentUser) {
        db.ref('users/' + currentUser + '/balance').on('value', snap => {
            userBalance = parseFloat(snap.val() || 0);
            document.getElementById('userBal').innerText = userBalance.toFixed(2);
        });
    }

    const board = document.getElementById('board');
    for (let i = 0; i < totalRows; i++) {
        let row = document.createElement('div'); row.className = 'row'; row.id = 'r-' + i;
        for (let j = 0; j < 3; j++) {
            let cell = document.createElement('div'); cell.className = 'cell';
            cell.innerHTML = `<span>${i+1}</span>`;
            cell.onclick = () => step(i, j);
            row.appendChild(cell);
        }
        board.appendChild(row);
    }

    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
    }

    function startGame() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (userBalance < bet || bet < 10) return alert("Check Balance!");
        db.ref('users/' + currentUser + '/balance').transaction(b => b - bet);
        currentLvl = 0;
        document.querySelectorAll('.cell').forEach(c => { c.classList.remove('clicked', 'bomb'); c.innerText = c.parentElement.id.split('-')[1]*1+1; });
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('cashBtn').style.display = 'block';
        activate(0);
    }

    function activate(l) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        if (l < totalRows) {
            let target = document.getElementById('r-' + l);
            target.classList.add('active');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function step(r, c) {
        if (r !== currentLvl) return;
        let isBomb = Math.random() < config[currentMode].bombProb;
        let cells = document.getElementById('r-' + r).children;
        if (isBomb) {
            cells[c].classList.add('bomb'); cells[c].innerText = '💣';
            setTimeout(() => { alert("Game Over!"); reset(); }, 300);
        } else {
            cells[c].classList.add('clicked'); cells[c].innerText = '⭐';
            currentLvl++;
            if (currentLvl === totalRows) cashout(); else activate(currentLvl);
        }
    }

    function reset() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        document.getElementById('scrollBox').scrollTo({top: board.scrollHeight});
    }

    function adjustBet(v) {
        let b = document.getElementById('betAmount');
        b.value = Math.max(10, parseInt(b.value) + v);
    }
</script>
</body>
</html>
