<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Tower Blast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #1a1b1e; color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        /* Loading Screen UI with Stars */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.5s ease; overflow: hidden; }
        .load-star { position: absolute; color: rgba(255, 204, 0, 0.4); font-size: 12px; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

        .load-title { font-size: 45px; font-weight: 900; color: #ffcc00; margin: 0; text-shadow: 0 0 20px rgba(255,204,0,0.5); z-index: 10; }
        .load-subtitle { font-size: 25px; font-weight: 800; color: #22c55e; margin: -5px 0 10px 0; z-index: 10; }
        .load-dev { font-size: 14px; color: #94a3b8; letter-spacing: 2px; margin-bottom: 20px; z-index: 10; }
        .loading-bar-bg { width: 70%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; z-index: 10; }
        .loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #f59e0b); box-shadow: 0 0 10px #ffcc00; transition: width 0.1s; }
        .yasir-footer { position: absolute; bottom: 15px; right: 15px; font-size: 10px; color: #475569; font-weight: bold; z-index: 10; }

        /* Header & Game UI (Stars Background Removed) */
        header { height: 55px; width: 100%; padding: 0 15px; background: #1a1b1e; display: flex; align-items: center; border-bottom: 1px solid #2d2f34; }
        .exit-btn { background: #2d2f34; color: #ff4d4d; border: 1px solid #3d3f46; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 12px; }
        .balance-box { margin-left: auto; background: #2d2f34; padding: 6px 15px; border-radius: 8px; font-weight: bold; border: 1px solid #3d3f46; color: #ffcc00; }
        .multiplier-bar { display: flex; gap: 10px; padding: 12px; background: #141518; overflow-x: auto; border-bottom: 1px solid #2d2f34; }
        .m-item { background: #2d2f34; padding: 8px 15px; border-radius: 6px; font-size: 13px; color: #ffcc00; border: 1px solid #3d3f46; white-space: nowrap; }
        .m-item.active-step { background: rgba(255, 204, 0, 0.2); border-color: #ffcc00; }
        .game-area-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .mode-container { display: flex; gap: 8px; padding: 10px; }
        .mode-btn { flex: 1; padding: 10px; background: #2d2f34; border: 1px solid #3d3f46; color: #94a3b8; border-radius: 8px; font-weight: 800; cursor: pointer; text-align: center; }
        .mode-btn.active { border-color: #ffcc00; color: #ffcc00; background: rgba(255,204,0,0.1); }
        .scroll-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; align-items: center; padding: 20px 0 220px 0; }
        .game-board { width: 90%; max-width: 360px; display: flex; flex-direction: column-reverse; gap: 12px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; opacity: 0.2; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }
        .cell { height: 60px; background: #2d2f34; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #3d3f46; cursor: pointer; color: #ffcc00; font-size: 20px; }
        .cell.clicked { background: #3b82f6 !important; color: white; }
        .cell.bomb { background: #ef4444 !important; color: white; }

        /* Footer Controls */
        .footer-controls { position: fixed; bottom: 0; left: 0; width: 100%; background: #1f2024; border-top: 2px solid #2d2f34; padding: 10px 15px 30px 15px; }
        .quick-amounts { display: flex; gap: 8px; margin-bottom: 12px; }
        .q-btn { flex: 1; background: #2d2f34; color: white; padding: 8px; border-radius: 6px; font-size: 12px; border: 1px solid #3d3f46; cursor: pointer; }
        .bet-container { display: flex; gap: 12px; height: 55px; }
        .amount-input-box { flex: 1; background: #2d2f34; border-radius: 10px; display: flex; align-items: center; border: 1px solid #3d3f46; padding: 0 10px; }
        .adjust-btn { background: none; border: none; color: #ffcc00; font-size: 22px; font-weight: bold; cursor: pointer; padding: 0 10px; }
        #betAmount { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: 100%; text-align: center; outline: none; }
        .btn-main { flex: 1.2; border: none; border-radius: 10px; color: white; font-weight: 900; font-size: 18px; cursor: pointer; }
        #startBtn { background: #3b82f6; }
        #cashBtn { background: #10b981; }
    </style>
</head>
<body onload="initApp()">

<div id="loading-screen">
    <div id="loading-stars-box"></div>
    <h1 class="load-title">KPK WIN</h1>
    <h2 class="load-subtitle">TOWER</h2>
    <div class="load-dev">Y---R</div>
    <div class="loading-bar-bg"><div class="loading-bar-fill" id="loadFill"></div></div>
    <div style="margin-top:10px; font-size:12px; color:#ffcc00; letter-spacing:3px;">LOADING...</div>
    <div class="yasir-footer">create by Yasirsawab</div>
</div>

<header>
    <div class="exit-btn" onclick="exitGame()">✖</div>
    <div style="font-weight:900;">KPK <span style="color:#ffcc00;">WIN</span></div>
    <div class="balance-box">Rs <span id="userBal">0.00</span></div>
</header>

<div class="game-area-wrapper">
    <div class="multiplier-bar" id="multBar"></div>
    <div class="mode-container">
        <div class="mode-btn active" id="m-easy" onclick="setMode('easy')">EASY</div>
        <div class="mode-btn" id="m-normal" onclick="setMode('normal')">NORMAL</div>
        <div class="mode-btn" id="m-strong" onclick="setMode('strong')">STRONG</div>
    </div>
    <div class="scroll-container" id="scrollBox"><div class="game-board" id="board"></div></div>
    
    <div class="footer-controls">
        <div class="quick-amounts">
            <button class="q-btn" onclick="setBet(100)">100</button>
            <button class="q-btn" onclick="setBet(500)">500</button>
            <button class="q-btn" onclick="setBet(1000)">1000</button>
            <button class="q-btn" onclick="setBet(2000)">2000</button>
        </div>
        <div class="bet-container">
            <div class="amount-input-box">
                <button class="adjust-btn" onclick="changeBet(-10)">−</button>
                <input type="number" id="betAmount" value="50">
                <button class="adjust-btn" onclick="changeBet(10)">+</button>
            </div>
            <button id="startBtn" class="btn-main" onclick="startGame()">BET ⭐</button>
            <button id="cashBtn" class="btn-main" style="display:none;" onclick="cashout()">CASHOUT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", 
        databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUserId = sessionStorage.getItem("currentUserId");
    let balance = 0, currentLvl = 0, currentMode = 'easy';

    const configs = {
        easy: { start: 1.20, step: 0.35, prob: 0.25 },
        normal: { start: 1.50, step: 0.60, prob: 0.40 },
        strong: { start: 2.00, step: 1.20, prob: 0.60 }
    };

    // Create Stars only for Loading Screen
    function createLoadingStars() {
        const box = document.getElementById('loading-stars-box');
        for(let i=0; i<40; i++) {
            let s = document.createElement('div');
            s.className = 'load-star';
            s.innerHTML = '⭐';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 2 + 's';
            box.appendChild(s);
        }
    }

    function exitGame() {
        window.location.href = "https://supportcom-rgb.github.io/io/"; 
    }

    function initApp() {
        createLoadingStars();
        if(!currentUserId || currentUserId === null) {
            window.location.replace('login.html'); 
            return;
        }
        db.ref('users/' + currentUserId + '/balance').on('value', snap => {
            if(snap.exists()) {
                balance = parseFloat(snap.val() || 0);
                document.getElementById('userBal').innerText = balance.toFixed(2);
            } else {
                window.location.replace('login.html');
            }
        });
        startLoading();
        updateMultipliers();
        createBoard();
    }

    function startLoading() {
        let prg = 0;
        const inv = setInterval(() => {
            prg += 2; 
            document.getElementById('loadFill').style.width = prg + '%';
            if(prg >= 100) { 
                clearInterval(inv); 
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display='none', 500);
            }
        }, 40);
    }

    function changeBet(val) {
        let input = document.getElementById('betAmount');
        let current = parseFloat(input.value) || 0;
        if(current + val >= 10) { input.value = current + val; }
    }

    function setBet(amt) { document.getElementById('betAmount').value = amt; }

    function createBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        for (let i = 0; i < 30; i++) {
            let row = document.createElement('div'); row.className = 'row'; row.id = 'r-' + i;
            for (let j = 0; j < 3; j++) {
                let cell = document.createElement('div'); cell.className = 'cell';
                cell.innerHTML = '★'; cell.onclick = () => step(i, j);
                row.appendChild(cell);
            }
            board.appendChild(row);
        }
    }

    function updateMultipliers() {
        const bar = document.getElementById('multBar'); bar.innerHTML = '';
        let conf = configs[currentMode];
        for(let i=0; i<30; i++) {
            let val = (conf.start + (i * conf.step)).toFixed(2);
            let div = document.createElement('div'); div.className = 'm-item'; div.id = 'step-' + i;
            div.innerText = val + 'x ⭐'; bar.appendChild(div);
        }
    }

    function setMode(m) {
        if(document.getElementById('startBtn').style.display === 'none') return;
        currentMode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + m).classList.add('active');
        updateMultipliers();
    }

    function startGame() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if (amt < 10) return alert("Min bet is 10!");
        if (balance < amt) return alert("Low Balance!");

        db.ref('users/' + currentUserId + '/balance').transaction(cb => (cb || 0) - amt).then(() => {
            currentLvl = 0;
            document.querySelectorAll('.cell').forEach(c => { c.classList.remove('clicked', 'bomb'); c.innerHTML = '★'; });
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashBtn').style.display = 'block';
            document.getElementById('cashBtn').innerText = "CASHOUT (0.00x)";
            activateRow(0);
        });
    }

    function activateRow(l) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        if (l < 30) {
            const activeRow = document.getElementById('r-' + l);
            activeRow.classList.add('active');
            activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.m-item').forEach(m => m.classList.remove('active-step'));
            let stepElem = document.getElementById('step-' + l);
            if(stepElem) { stepElem.classList.add('active-step'); stepElem.scrollIntoView({ behavior: 'smooth', inline: 'center' }); }
        }
    }

    function step(r, c) {
        if (r !== currentLvl) return;
        let conf = configs[currentMode];
        let cell = document.getElementById('r-' + r).children[c];
        
        if (Math.random() < conf.prob) {
            cell.classList.add('bomb'); cell.innerHTML = '💣';
            setTimeout(() => { alert("Game Over!"); resetGame(); }, 300);
        } else {
            cell.classList.add('clicked'); cell.innerHTML = '✔';
            currentLvl++;
            let currentMult = (conf.start + ((currentLvl-1) * conf.step)).toFixed(2);
            document.getElementById('cashBtn').innerText = "CASHOUT (" + currentMult + "x)";
            activateRow(currentLvl);
        }
    }

    function cashout() {
        if (currentLvl === 0) return;
        let conf = configs[currentMode];
        let mult = (conf.start + ((currentLvl-1) * conf.step));
        let bet = parseFloat(document.getElementById('betAmount').value);
        let win = bet * mult;

        db.ref('users/' + currentUserId + '/balance').transaction(cb => (cb || 0) + win).then(() => {
            alert("Winner! Won Rs " + win.toFixed(2));
            resetGame();
        });
    }

    function resetGame() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        currentLvl = 0;
    }
</script>
</body>
</html>
