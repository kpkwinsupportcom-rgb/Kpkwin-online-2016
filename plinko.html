<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK Win - Plinko Professional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #0b1426; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #16213e; box-sizing: border-box; border-bottom: 2px solid #1f2d4d; }
        .balance-pill { background: #000; border: 2px solid #00ffcc; padding: 6px 15px; border-radius: 20px; color: #00ffcc; font-weight: bold; font-size: 18px; }
        #plinko-board { position: relative; width: 360px; height: 380px; }
        .speed-container { margin: 10px; display: flex; gap: 5px; }
        .speed-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .speed-btn.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        .slot-container { width: 360px; display: flex; flex-direction: column; gap: 2px; padding: 0 10px; box-sizing: border-box; }
        .slot-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; width: 100%; }
        .slot { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #000; border-radius: 2px; }
        .controls { width: 95%; max-width: 360px; background: #16213e; padding: 15px; border-radius: 15px; margin-top: 10px; }
        .bet-input { display: flex; justify-content: space-between; align-items: center; background: #0b1426; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #2a3a5a; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .history-box { width: 95%; max-width: 360px; margin-top: 10px; background: #16213e; padding: 10px; border-radius: 10px; height: 120px; overflow-y: auto; font-size: 12px; margin-bottom: 20px; border: 1px solid #1f2d4d; }
        table { width: 100%; text-align: center; border-collapse: collapse; }
        th { color: #888; border-bottom: 1px solid #2a3a5a; padding-bottom: 5px; }
        td { padding: 5px 0; border-bottom: 1px solid #0b1426; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="window.history.back()" style="background:transparent; border:1px solid #444; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">BACK</button>
        <div class="balance-pill">PKR <span id="balance">Loading...</span></div>
    </div>

    <div class="speed-container">
        <button class="speed-btn" onclick="setSpeed(0.5, this)">Slow</button>
        <button class="speed-btn active" onclick="setSpeed(0.8, this)">Medium</button>
        <button class="speed-btn" onclick="setSpeed(1.3, this)">Fast</button>
    </div>

    <div id="plinko-board"></div>

    <div class="slot-container">
        <div class="slot-row" id="green-slots"></div>
        <div class="slot-row" id="yellow-slots"></div>
        <div class="slot-row" id="red-slots"></div>
    </div>

    <div class="controls">
        <div class="bet-input">
            <button onclick="updateBet(-50)" style="background:#2a3a5a; color:white; border:none; width:35px; height:35px; border-radius:5px; cursor:pointer;">-</button>
            <div style="text-align:center"><small style="color:#888">BET AMOUNT</small><br><b id="bet-val" style="color:#00ffcc">100.00</b></div>
            <button onclick="updateBet(50)" style="background:#2a3a5a; color:white; border:none; width:35px; height:35px; border-radius:5px; cursor:pointer;">+</button>
        </div>
        <div class="btn-group">
            <button class="btn" style="background:#2ecc71; color:white;" onclick="play('green')">Green</button>
            <button class="btn" style="background:#f1c40f; color:black;" onclick="play('yellow')">Yellow</button>
            <button class="btn" style="background:#e74c3c; color:white;" onclick="play('red')">Red</button>
        </div>
    </div>

    <div class="history-box">
        <table>
            <thead><tr><th>Mode</th><th>Bet</th><th>Mult</th><th>Result</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA",
        databaseURL: "https://kpk-win-default-rtdb.firebaseio.com",
        projectId: "kpk-win"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const loggedInUserUID = localStorage.getItem('userUID'); 
    let userBalance = 0.00;

    if (!loggedInUserUID) {
        alert("Please login first!");
        window.location.href = "index.html"; 
    } else {
        db.ref('users/' + loggedInUserUID + '/balance').on('value', snap => {
            if(snap.exists()){
                userBalance = parseFloat(snap.val());
                document.getElementById('balance').innerText = userBalance.toFixed(2);
            }
        });
    }

    const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    engine.gravity.y = 1.0; 

    const width = 360;
    const height = 380;
    const render = Render.create({
        element: document.getElementById('plinko-board'),
        engine: engine,
        options: { width: width, height: height, wireframes: false, background: 'transparent' }
    });

    // 🔴 FIXED MULTIPLIERS FOR PROFIT
    const mults = {
        green: [10, 5, 2, 1.2, 1.1, 1, 0.5, 1, 1.1, 1.2, 2, 5, 10],
        yellow: [15, 8, 4, 1.5, 1.1, 0.8, 0.2, 0.8, 1.1, 1.5, 4, 8, 15],
        red: [20, 10, 5, 2, 1.1, 0.4, 0, 0.4, 1.1, 2, 5, 10, 20] 
    };

    function setSpeed(val, btn) {
        engine.timing.timeScale = val;
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setupSlots() {
        ['green', 'yellow', 'red'].forEach(c => {
            const row = document.getElementById(c + '-slots');
            row.innerHTML = "";
            mults[c].forEach(m => {
                const d = document.createElement('div');
                d.className = 'slot';
                d.style.background = c==='green'?'#2ecc71':(c==='yellow'?'#f1c40f':'#e74c3c');
                d.style.color = c==='yellow'?'#000':'#fff';
                d.innerText = m + 'x';
                row.appendChild(d);
            });
        });
    }
    setupSlots();

    for (let r = 2; r <= 12; r++) {
        for (let i = 0; i < r; i++) {
            const x = width / 2 + (i - (r - 1) / 2) * 26;
            const y = 35 + (r * 28);
            Composite.add(world, Bodies.circle(x, y, 3.5, { 
                isStatic: true, 
                friction: 0.1, 
                restitution: 0.8,
                render: { fillStyle: '#fff' } 
            }));
        }
    }

    let bet = 100.00;
    function updateBet(v) {
        if (bet + v >= 10) { bet += v; document.getElementById('bet-val').innerText = bet.toFixed(2); }
    }

    function play(mode) {
        if (userBalance < bet) return alert("Low Balance!");
        
        // Step 1: Bet Deduct
        db.ref('users/' + loggedInUserUID + '/balance').transaction(current => {
            return (current || 0) - bet;
        });

        const ball = Bodies.circle(width / 2 + (Math.random() * 4 - 2), 15, 6, {
            restitution: 0.6, friction: 0.05, frictionAir: 0.045, 
            collisionFilter: { group: -1 },
            render: { fillStyle: mode==='green'?'#2ecc71':(mode==='yellow'?'#f1c40f':'#e74c3c') }
        });
        Composite.add(world, ball);

        const check = setInterval(() => {
            if (ball.position.y > 370) {
                clearInterval(check);
                let idx = Math.floor((ball.position.x / width) * 13);
                idx = Math.max(0, Math.min(idx, 12));
                let m = mults[mode][idx];
                
                // 🔒 ADMIN PROFIT LOGIC (80% LOSS)
                if (Math.random() < 0.8) { 
                    const loseIdx = [5, 6, 7];
                    m = mults[mode][loseIdx[Math.floor(Math.random() * 3)]];
                }

                const win = bet * m;
                
                // Step 2: Add Win
                db.ref('users/' + loggedInUserUID + '/balance').transaction(current => {
                    return parseFloat(((current || 0) + win).toFixed(2));
                });
                
                const log = `<tr><td style="color:${mode==='green'?'#2ecc71':(mode==='yellow'?'#f1c40f':'#e74c3c')}">${mode.toUpperCase()}</td><td>${bet}</td><td>${m}x</td><td style="color:${win>=bet?'#2ecc71':'#e74c3c'}">${win.toFixed(2)}</td></tr>`;
                document.getElementById('logs').insertAdjacentHTML('afterbegin', log);
                Composite.remove(world, ball);
            }
        }, 100);
    }

    Render.run(render);
    Runner.run(Runner.create(), engine);
</script>
</body>
</html>
