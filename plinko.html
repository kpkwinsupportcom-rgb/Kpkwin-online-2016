<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPK-WIN | Plinko Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        body { margin: 0; background: #071511; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #071511; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loader-logo { font-size: 35px; font-weight: 900; color: #ff9900; }
        .load-bar { width: 180px; height: 4px; background: #163026; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .load-fill { width: 0%; height: 100%; background: #ff9900; }

        header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #0f1c18; border-bottom: 1.5px solid #ff9900; z-index: 1000; }
        .balance-box { background: rgba(255, 153, 0, 0.1); padding: 5px 12px; border-radius: 6px; border: 1.5px solid #ff9900; font-weight: 800; color: #ff9900; }

        /* --- HISTORY CSS --- */
        #history-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; z-index: 10001; padding: 20px; box-sizing: border-box; }
        .history-content { background: #0f1c18; border: 1.5px solid #ff9900; border-radius: 10px; height: 80%; overflow-y: auto; padding: 10px; margin-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #163026; font-size: 13px; font-weight: bold; }
        .h-win { color: #2ecc71; }
        .h-loss { color: #e74c3c; }
        .close-h-btn { background: #ff9900; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; width: 100%; }

        .speed-container { display: flex; gap: 5px; margin-top: 5px; width: 95%; justify-content: center; }
        .speed-btn { flex: 1; padding: 8px; border: 1px solid #163026; background: #0f1c18; color: #a4bfa3; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .speed-btn.active { background: #ff9900; color: black; border-color: #ff9900; }

        #plinko-board { position: relative; width: 360px; height: 320px; }
        .slot-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; width: 340px; margin-top: -5px; }
        .slot { height: 25px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #000; border-radius: 4px; }

        .quick-bet-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; width: 95%; margin-top: 8px; }
        .q-btn { background: #163026; border: 1px solid #ff9900; color: #ff9900; padding: 6px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .controls { width: 95%; max-width: 360px; background: #0f1c18; padding: 10px; border-radius: 12px; margin-top: 5px; border: 1px solid #163026; }
        .play-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
        .p-btn { border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 11px; }

        #win-toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #ff9900; padding: 15px 30px; border-radius: 10px; font-size: 24px; font-weight: 900; border: 2px solid #ff9900; z-index: 10000; display: none; }
    </style>
</head>
<body onload="initGame()">

    <div id="loading-screen">
        <div class="loader-logo">PLINKO</div>
        <div class="loader-logo" style="font-size: 22px; color: white;">KPK WIN</div>
        <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
    </div>

    <!-- --- HISTORY MODAL --- -->
    <div id="history-modal">
        <h2 style="color:#ff9900; text-align:center; margin:0;">HISTORY</h2>
        <div class="history-content" id="history-list">
            <!-- Bets will be added here via JS -->
        </div>
        <button class="close-h-btn" onclick="toggleHistory(false)">CLOSE</button>
    </div>

    <header>
        <button style="background:#163026; color:#ff9900; border:1px solid #ff9900; padding:5px 12px; border-radius:6px;" onclick="window.location.href='index.html'">🏠 EXIT</button>
        <!-- Naya History Button -->
        <button style="background:#ff9900; color:black; border:none; padding:5px 10px; border-radius:6px; font-weight:bold; font-size:12px;" onclick="toggleHistory(true)">📋 HISTORY</button>
        <div class="balance-box">Rs <span id="userBal">0.00</span></div>
    </header>

    <div class="speed-container">
        <button class="speed-btn" id="slow" onclick="setSpeed('slow')">SLOW</button>
        <button class="speed-btn active" id="normal" onclick="setSpeed('normal')">NORMAL</button>
        <button class="speed-btn" id="fast" onclick="setSpeed('fast')">FAST</button>
    </div>

    <div id="plinko-board"></div>
    <div class="slot-row" id="multiplier-row"></div>

    <div class="quick-bet-container">
        <button class="q-btn" onclick="setQuickBet(30)">30</button>
        <button class="q-btn" onclick="setQuickBet(50)">50</button>
        <button class="q-btn" onclick="setQuickBet(70)">70</button>
        <button class="q-btn" onclick="setQuickBet(100)">100</button>
        <button class="q-btn" onclick="setQuickBet(300)">300</button>
        <button class="q-btn" onclick="setQuickBet(500)">500</button>
        <button class="q-btn" onclick="setQuickBet(1000)">1000</button>
        <button class="q-btn" style="background:#ff9900; color:black;" onclick="setQuickBet(userBalance)">MAX</button>
    </div>

    <div id="win-toast">WIN: Rs 0.00</div>

    <div class="controls">
        <div style="display:flex; justify-content: space-between; align-items:center; background:#071511; padding:8px; border-radius:10px;">
            <button style="color:#ff9900; background:none; border:none; font-size:24px;" onclick="changeBet(-10)">-</button>
            <div style="font-size:16px; color:#ff9900; font-weight:900;">Rs <span id="betAmt">30</span></div>
            <button style="color:#ff9900; background:none; border:none; font-size:24px;" onclick="changeBet(10)">+</button>
        </div>
        <div class="play-btns">
            <button class="p-btn" style="background:#2ecc71; color:white;" onclick="dropBall('low')">Low</button>
            <button class="p-btn" style="background:#f1c40f; color:black;" onclick="dropBall('mid')">Mid</button>
            <button class="p-btn" style="background:#e74c3c; color:white;" onclick="dropBall('high')">High</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUserId = sessionStorage.getItem("currentUserId");
    let userBalance = 0, currentBet = 30;
    let betHistory = []; // Local history storage

    const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    
    engine.positionIterations = 10;
    engine.velocityIterations = 10;
    engine.gravity.y = 1.0; 

    const render = Render.create({
        element: document.getElementById('plinko-board'),
        engine: engine,
        options: { width: 360, height: 320, wireframes: false, background: 'transparent' }
    });

    // --- HISTORY FUNCTIONS ---
    function toggleHistory(show) {
        const modal = document.getElementById('history-modal');
        const list = document.getElementById('history-list');
        modal.style.display = show ? 'flex' : 'none';
        
        if(show) {
            list.innerHTML = "";
            if(betHistory.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#666;'>No bets recorded yet.</p>";
            } else {
                // Reverse takay sab se latest bet opar aaye
                betHistory.slice().reverse().forEach(data => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const winClass = data.win >= data.bet ? 'h-win' : 'h-loss';
                    div.innerHTML = `
                        <span>Bet: Rs ${data.bet}</span>
                        <span>x${data.mult}</span>
                        <span class="${winClass}">Rs ${data.win.toFixed(2)}</span>
                    `;
                    list.appendChild(div);
                });
            }
        }
    }

    function setSpeed(mode) {
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode).classList.add('active');
        if(mode === 'slow') engine.gravity.y = 0.5;
        if(mode === 'normal') engine.gravity.y = 1.0;
        if(mode === 'fast') engine.gravity.y = 2.2; 
    }

    function initGame() {
        if(!currentUserId) { window.location.href='index.html'; return; }
        db.ref('users/' + currentUserId + '/balance').on('value', s => {
            userBalance = parseFloat(s.val() || 0);
            document.getElementById('userBal').innerText = userBalance.toFixed(2);
        });

        Composite.add(world, [
            Bodies.rectangle(5, 160, 10, 320, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(355, 160, 10, 320, { isStatic: true, render: { visible: false } })
        ]);

        for (let r = 0; r < 14; r++) {
            const pins = r + 3;
            for (let i = 0; i < pins; i++) {
                const x = 180 + (i - (pins - 1) / 2) * 25;
                const y = 35 + (r * 19);
                const peg = Bodies.circle(x, y, 3, { 
                    isStatic: true, label: 'peg',
                    restitution: 0.6, friction: 0.1,
                    render: { fillStyle: '#ffffff22' } 
                });
                Composite.add(world, peg);
            }
        }

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const a = pair.bodyA; const b = pair.bodyB;
                if (a.label === 'peg') { a.render.fillStyle = '#ff9900'; setTimeout(() => a.render.fillStyle = '#ffffff22', 80); }
                if (b.label === 'peg') { b.render.fillStyle = '#ff9900'; setTimeout(() => b.render.fillStyle = '#ffffff22', 80); }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        let prg = 0;
        let t = setInterval(() => {
            prg += 5; document.getElementById('loadFill').style.width = prg + '%';
            if(prg >= 100) { clearInterval(t); document.getElementById('loading-screen').style.display='none'; }
        }, 30);
    }

    const multipliers = [10, 5, 2, 1.2, 1.1, 0.5, 0.2, 0.5, 1.1, 1.2, 2, 5, 10];
    const rowElem = document.getElementById('multiplier-row');
    multipliers.forEach(m => {
        const d = document.createElement('div'); d.className = 'slot';
        d.style.background = m >= 1 ? '#ff9900' : '#444';
        d.innerText = m + 'x'; rowElem.appendChild(d);
    });

    function setQuickBet(amt) {
        currentBet = Math.min(1000, Math.floor(amt));
        document.getElementById('betAmt').innerText = currentBet;
    }

    function changeBet(v) {
        let nextBet = currentBet + v;
        if (nextBet <= 1000 && nextBet >= 30) currentBet = nextBet;
        document.getElementById('betAmt').innerText = currentBet;
    }

    function dropBall(risk) {
        if (userBalance < currentBet) { alert("Low Balance!"); return; }
        
        // Save current bet to capture it for history later
        const bAmount = currentBet; 
        db.ref('users/' + currentUserId + '/balance').transaction(cb => (cb || 0) - currentBet);

        const ball = Bodies.circle(180 + (Math.random() * 2 - 1), 5, 6, {
            restitution: 0.5, friction: 0.1, frictionAir: 0.02,
            collisionFilter: { group: -1 },
            render: { fillStyle: risk === 'low' ? '#2ecc71' : (risk === 'mid' ? '#f1c40f' : '#e74c3c') }
        });
        
        Body.setVelocity(ball, { x: (Math.random() - 0.5) * 1.5, y: 0 });
        Composite.add(world, ball);

        let lastY = 0;
        let stuckCount = 0;

        const checkEnd = setInterval(() => {
            if(Math.abs(ball.position.y - lastY) < 1) {
                stuckCount++;
                if(stuckCount > 20) {
                    Body.applyForce(ball, ball.position, { x: (Math.random() - 0.5) * 0.005, y: 0 });
                    stuckCount = 0;
                }
            } else { stuckCount = 0; }
            lastY = ball.position.y;

            if (ball.position.y > 310) {
                clearInterval(checkEnd);
                let col = Math.floor((ball.position.x / 360) * 13);
                col = Math.max(0, Math.min(col, 12));
                
                let m = multipliers[col];
                if (m >= 1 && Math.random() < 0.8) m = (Math.random() > 0.5) ? 0.2 : 0.5;

                let winAmt = bAmount * m;

                // --- SAVE TO HISTORY ---
                betHistory.push({ bet: bAmount, mult: m, win: winAmt });
                if(betHistory.length > 20) betHistory.shift(); // Sirf pichli 20 bets rakhein

                document.getElementById('win-toast').innerText = "WIN: Rs " + winAmt.toFixed(2);
                document.getElementById('win-toast').style.display = 'block';
                setTimeout(() => document.getElementById('win-toast').style.display = 'none', 1000);

                db.ref('users/' + currentUserId + '/balance').transaction(cb => (cb || 0) + winAmt);
                Composite.remove(world, ball);
            }
        }, 100);
    }
</script>
</body>
</html>
