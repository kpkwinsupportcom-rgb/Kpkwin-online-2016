<script>
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUserId = sessionStorage.getItem("currentUserId");
    let currentUsername = "User"; 
    let balance = 0, mult = 1.00, isFlying = false, totalWinRound = 0, totalBetRound = 0;
    
    let pStates = { 1: 'ready', 2: 'ready' }; 
    let queuedBets = { 1: null, 2: null }; 
    
    let botList = [], myHistory = [], fullHist = [], currentTab = 'all', currentSubTab = 'daily';

    let roundCounter = 0;
    let totalBetsCycle = 0;
    let totalPayoutCycle = 0;
    let adminProfitRate = 20; 

    let activeUserBetsThisRound = {};
    let lastSyncedState = ""; 

    let soundEnabled = true;
    const tickSound = new Audio('fly.mp3'); 
    const flySound = new Audio('fly.mp3');
    const winSound = new Audio('win.mp3');   
    const crashSound = new Audio('crash.mp3');
    
    flySound.loop = true;
    tickSound.loop = true;

    document.addEventListener('click', () => {
        if(soundEnabled) {
            [tickSound, flySound, winSound, crashSound].forEach(audio => {
                if(audio.paused && audio.currentTime === 0) {
                    audio.play().then(() => audio.pause()).catch(() => {});
                }
            });
        }
    }, { once: true });

    function playSound(sound) {
        if (soundEnabled) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Audio play context restricted: ", e));
        }
    }

    function stopSound(sound) {
        sound.pause();
        sound.currentTime = 0;
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('sound-status').innerText = soundEnabled ? "ON" : "OFF";
        document.getElementById('sound-icon').innerText = soundEnabled ? "🔊" : "🔇";
        if (!soundEnabled) {
            stopSound(flySound);
            stopSound(tickSound);
            stopSound(winSound);
            stopSound(crashSound);
        }
    }

    function initFirebase() {
        if(!currentUserId) { 
            showCustomAlert("SESSION MISSING! Please open through login.html", "error");
            setTimeout(() => { window.location.href='index.html'; }, 3000);
            return; 
        }

        generateBots();

        db.ref('users/' + currentUserId).once('value', s => {
            if(s.exists() && s.val().name) {
                currentUsername = s.val().name; 
                refreshButtonLabels();
                refreshTable();
            }
        });

        setTimeout(() => {
            document.getElementById('loading-page').style.display = 'none';
            document.getElementById('connecting-page').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('connecting-page').style.display = 'none';
                listenToGlobalGameRoom();
            }, 2000); 
        }, 3000);

        db.ref('users/' + currentUserId + '/balance').on('value', s => {
            balance = parseFloat(s.val() || 0);
            document.getElementById('main-balance').innerText = balance.toFixed(2);
        });

        db.ref('onlineGames').on('value', snap => {
            if(snap.exists()) {
                snap.forEach(child => {
                    if(child.val().name === "Aviator") {
                        adminProfitRate = parseFloat(child.val().profitPercent || 20);
                    }
                });
            }
        });
    }

    function refreshButtonLabels() {
        [1, 2].forEach(id => {
            if(pStates[id] === 'ready') {
                document.getElementById('lbl' + id).innerText = "BET (" + currentUsername + ")";
            }
        });
    }

    function listenToGlobalGameRoom() {
        db.ref('aviator_room').on('value', snap => {
            if (!snap.exists()) {
                createNewRoundData();
                return;
            }
            
            let data = snap.val();
            roundCounter = data.roundCounter || 0;
            totalBetsCycle = data.totalBetsCycle || 0;
            totalPayoutCycle = data.totalPayoutCycle || 0;

            if (data.state === "countdown") {
                if (lastSyncedState !== "countdown") {
                    lastSyncedState = "countdown";
                    runGlobalCountdown(data.countdownTime);
                }
            } else if (data.state === "flying") {
                if (lastSyncedState !== "flying") {
                    lastSyncedState = "flying";
                    runGlobalFlight(data.crashPoint);
                }
            } else if (data.state === "crashed") {
                if (lastSyncedState !== "crashed") {
                    lastSyncedState = "crashed";
                    triggerFlewAway(data.crashPoint);
                }
            }
        });
    }

    function createNewRoundData() {
        let calculatedCrashPoint = calculateProfitSafeCrash();
        let nextRoundCount = roundCounter + 1;
        let nextTotalBets = totalBetsCycle;
        let nextTotalPayout = totalPayoutCycle;
        
        if (nextRoundCount > 20) {
            nextRoundCount = 1;
            nextTotalBets = 0;
            nextTotalPayout = 0;
        }

        db.ref('aviator_room').set({
            state: "countdown",
            countdownTime: 5.0,
            currentMult: 1.00,
            crashPoint: calculatedCrashPoint,
            roundCounter: nextRoundCount,
            totalBetsCycle: nextTotalBets,
            totalPayoutCycle: nextTotalPayout,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function calculateProfitSafeCrash() {
        let userPayoutFactor = (100 - adminProfitRate) / 100; 
        let totalAllowedUserPayoutForCycle = totalBetsCycle * userPayoutFactor; 
        let currentCyclePayout = totalPayoutCycle; 
        
        let chance = Math.random() * 100;
        let crash;

        if (currentCyclePayout >= totalAllowedUserPayoutForCycle && totalBetsCycle > 0) {
            crash = 1.01 + (Math.random() * 0.14); 
        } else {
            if (chance < 35) { 
                crash = 1.10 + (Math.random() * 0.70);
            } else if (chance < 85) {
                crash = 2.00 + (Math.random() * 3.00);
            } else {
                let maxSafeJump = Math.min(30.0, (totalAllowedUserPayoutForCycle - currentCyclePayout) / 100);
                if (maxSafeJump < 5.0) maxSafeJump = 5.0;
                crash = 5.00 + (Math.random() * (maxSafeJump - 5.00));
            }
        }
        return parseFloat(crash.toFixed(2));
    }

    function runGlobalCountdown(initialCount) {
        isFlying = false; mult = 1.00; totalWinRound = 0; totalBetRound = 0; 
        activeUserBetsThisRound = {}; 
        
        stopSound(flySound); 
        stopSound(tickSound);
        
        if(soundEnabled) {
            flySound.play().catch(e => console.log(e));
        }
        
        document.getElementById('total-win-amt').innerText = "0.00";
        document.getElementById('multiplier').style.display = "none";
        document.getElementById('multiplier').style.color = "white";
        document.getElementById('logo-container').style.display = "block";
        document.getElementById('countdown-timer').style.display = 'block';
        
        [1, 2].forEach(id => {
            if(pStates[id] === 'queued' && queuedBets[id] !== null) {
                let amt = queuedBets[id];
                if(balance >= amt) {
                    updateDB(-amt); 
                    pStates[id] = 'waiting';
                    activeUserBetsThisRound[id] = { 
                        amt: amt, 
                        saved: false,
                        uiRef: { user: currentUsername, bet: amt, x: "-", win: "-" }
                    };
                    queuedBets[id] = null;
                } else {
                    pStates[id] = 'ready';
                    queuedBets[id] = null;
                    showCustomAlert("INSUFFICIENT BALANCE FOR QUEUED BET!", "error");
                }
            }
            
            if(document.getElementById('autoBet' + id) && document.getElementById('autoBet' + id).checked && pStates[id] === 'ready') {
                handle(id); 
            }
            
            updateBtn(id, pStates[id]);
        });

        generateBots();

        let count = initialCount;
        let interval = setInterval(() => {
            count -= 0.1;
            if(count <= 0) {
                clearInterval(interval);
                db.ref('aviator_room/state').transaction(curr => curr === "countdown" ? "flying" : curr);
            } else {
                document.getElementById('sec').innerText = count.toFixed(1) + "s";
                document.getElementById('progress-line').style.width = (count/5)*100 + "%";
            }
        }, 100);
    }

    function runGlobalFlight(targetCrashPoint) {
        isFlying = true;
        document.getElementById('countdown-timer').style.display = 'none'; 
        document.getElementById('logo-container').style.display = "none";
        document.getElementById('multiplier').style.display = "block";
        
        if(soundEnabled && flySound.paused) {
            flySound.play().catch(e => console.log(e));
        }

        [1, 2].forEach(id => { 
            if(pStates[id] === 'waiting') {
                updateBtn(id, 'playing'); 
            }
        });

        let realUserBetsThisRound = 0;
        [1, 2].forEach(id => {
            if(pStates[id] === 'playing') {
                realUserBetsThisRound += parseFloat(document.getElementById('amt'+id).value || 0);
            }
        });
        
        if(realUserBetsThisRound > 0 && lastSyncedState === "flying") {
            db.ref('aviator_room/totalBetsCycle').transaction(c => (c || 0) + realUserBetsThisRound);
        }

        function updateLoop() {
            if (!isFlying || lastSyncedState !== "flying") return;
            
            let growth = mult < 2.0 ? 0.0032 : (mult < 10.0 ? 0.0025 : (mult < 100.0 ? 0.0038 : 0.0055));
            mult += mult * growth; 
            document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";

            [1, 2].forEach(id => {
                if(pStates[id] === 'playing') {
                    let amt = activeUserBetsThisRound[id] ? activeUserBetsThisRound[id].amt : parseFloat(document.getElementById('amt'+id).value);
                    document.getElementById('val'+id).innerText = (amt * mult).toFixed(2) + " PKR";
                    if(document.getElementById('autoCash'+id).checked && mult >= parseFloat(document.getElementById('autoVal'+id).value)) {
                        cashOut(id);
                    }
                }
            });

            botList.forEach(b => {
                if (b.win === "-") {
                    if (mult >= b.target) {
                        b.x = b.target.toFixed(2); 
                        b.win = (b.bet * b.target).toFixed(0);
                        totalWinRound += parseFloat(b.win);
                        document.getElementById('total-win-amt').innerText = totalWinRound.toFixed(0);
                    } else {
                        b.x = "-";
                    }
                }
            });
            
            refreshTable();

            if (mult >= targetCrashPoint) {
                db.ref('aviator_room/state').transaction(curr => curr === "flying" ? "crashed" : curr);
            } else {
                requestAnimationFrame(updateLoop);
            }
        }
        requestAnimationFrame(updateLoop);
    }

    function triggerFlewAway(finalCrash) {
        isFlying = false;
        stopSound(flySound);     
        stopSound(tickSound);     
        playSound(crashSound);   

        document.getElementById('multiplier').style.color = "#cb011a";
        document.getElementById('multiplier').innerHTML = finalCrash.toFixed(2) + "x<br><span style='font-size: 20px; font-weight: bold; display: block; margin-top: -5px;'>FLEW AWAY!</span>";
        
        Object.keys(activeUserBetsThisRound).forEach(id => {
            if(activeUserBetsThisRound[id] && !activeUserBetsThisRound[id].saved) {
                let amt = activeUserBetsThisRound[id].amt;
                myHistory.unshift({user: currentUsername, bet: amt, x: "Crash", win: "0.00"});
                
                if(activeUserBetsThisRound[id].uiRef) {
                    activeUserBetsThisRound[id].uiRef.x = "Crash";
                    activeUserBetsThisRound[id].uiRef.win = "0.00";
                }
                sendBetHistoryToFirebase(amt, 0, "loss");
            }
        });

        botList.forEach(b => {
            if(b.win === "-") {
                b.x = "Crash";
                b.win = "0.00";
            }
        });

        [1, 2].forEach(id => { 
            if(pStates[id] !== 'queued') {
                updateBtn(id, 'ready'); 
            }
        });
        
        updateHistory(finalCrash.toFixed(2));
        refreshTable();
        
        setTimeout(() => {
            createNewRoundData();
        }, 3000);
    }

    function showCustomAlert(msg, type='next_round') {
        let el = document.getElementById('custom-alert');
        el.innerText = msg;
        
        if(type === 'win') {
            el.style.color = '#ffc107'; 
            el.style.borderColor = '#ffc107'; 
            el.style.background = 'rgba(28, 29, 33, 0.98)';
        } else {
            // "Next Round" ya standard errors ke liye dynamic clean Red layout
            el.style.color = 'white'; 
            el.style.borderColor = '#cb011a'; 
            el.style.background = 'rgba(203, 1, 26, 0.98)';
        }
        
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    function toggleHistModal() {
        const m = document.getElementById('hist-modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') {
            document.getElementById('full-hist-list').innerHTML = fullHist.map(h => `<span class="${h.class}" style="font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; border:1px solid; min-width:45px; text-align:center;">${h.val}x</span>`).join('');
        }
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        
        if(t === 'top') {
            document.getElementById('top-filters').style.display = 'flex';
        } else {
            document.getElementById('top-filters').style.display = 'none';
        }
        refreshTable();
    }

    function switchSubTab(st) {
        currentSubTab = st;
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sub-' + st).classList.add('active');
        refreshTable();
    }

    function cashOut(id) {
        if(pStates[id] !== 'playing' || !isFlying) return; 

        let amt = activeUserBetsThisRound[id] ? activeUserBetsThisRound[id].amt : parseFloat(document.getElementById('amt' + id).value);
        let win = amt * mult;
        
        playSound(winSound); 

        db.ref('aviator_room/totalPayoutCycle').transaction(c => (c || 0) + win);
        totalWinRound += win;
        document.getElementById('total-win-amt').innerText = totalWinRound.toFixed(2);
        
        updateDB(win);
        updateBtn(id, 'ready'); 
        showCustomAlert("CASH OUT: " + win.toFixed(2) + " PKR", 'win');
        
        myHistory.unshift({user: currentUsername, bet: amt, x: mult.toFixed(2) + "x", win: win.toFixed(2)});
        
        if(activeUserBetsThisRound[id]) {
            activeUserBetsThisRound[id].saved = true;
            if(activeUserBetsThisRound[id].uiRef) {
                activeUserBetsThisRound[id].uiRef.x = mult.toFixed(2) + "x";
                activeUserBetsThisRound[id].uiRef.win = win.toFixed(0);
            }
        }
        sendBetHistoryToFirebase(amt, mult, "win");
        refreshTable();
    }

    function setAmt(id, v) { 
        document.getElementById('amt'+id).value = v.toFixed(2); 
        if(pStates[id] === 'ready') document.getElementById('val'+id).innerText = v.toFixed(2) + " PKR";
    }

    function adj(id, v) {
        let el = document.getElementById('amt'+id);
        let n = Math.max(10, parseFloat(el.value) + v);
        el.value = n.toFixed(2);
        if(pStates[id] === 'ready') document.getElementById('val'+id).innerText = n.toFixed(2) + " PKR";
    }

    function handle(id) {
        let amt = parseFloat(document.getElementById('amt' + id).value);
        
        if (pStates[id] === 'ready') {
            if (amt > 16000) { showCustomAlert("MAXIMUM BET IS 16,000 PKR!", "error"); return; }
            
            if (isFlying) {
                if (balance < amt) { showCustomAlert("INSUFFICIENT BALANCE!", "error"); return; }
                queuedBets[id] = amt;
                updateBtn(id, 'queued');
                showCustomAlert("BET ACCEPTED FOR NEXT ROUND", "next_round");
            } else {
                if (balance < amt) { showCustomAlert("INSUFFICIENT BALANCE!", "error"); return; }
                updateDB(-amt); 
                updateBtn(id, 'waiting');
                totalBetRound += amt;
                
                activeUserBetsThisRound[id] = { 
                    amt: amt, 
                    saved: false,
                    uiRef: { user: currentUsername, bet: amt, x: "-", win: "-" }
                };
            }
        } else if (pStates[id] === 'waiting') {
            updateDB(amt); 
            updateBtn(id, 'ready');
            totalBetRound -= amt;
            delete activeUserBetsThisRound[id];
        } else if (pStates[id] === 'queued') {
            queuedBets[id] = null;
            updateBtn(id, 'ready');
        } else if (pStates[id] === 'playing' && isFlying) {
            cashOut(id);
        }
        refreshTable(); 
    }

    function updateBtn(id, s) {
        pStates[id] = s;
        let btn = document.getElementById('btn'+id), lbl = document.getElementById('lbl'+id), val = document.getElementById('val'+id);
        
        if(s === 'ready') {
            btn.className = 'btn btn-green';
            lbl.innerText = "BET (" + currentUsername + ")";
            val.innerText = document.getElementById('amt'+id).value + " PKR";
        } else if(s === 'waiting') {
            btn.className = 'btn btn-red';
            lbl.innerText = 'CANCEL';
            val.innerText = document.getElementById('amt'+id).value + " PKR";
        } else if(s === 'playing') {
            btn.className = 'btn btn-orange';
            lbl.innerText = 'CASH OUT';
            let activeAmt = activeUserBetsThisRound[id] ? activeUserBetsThisRound[id].amt : parseFloat(document.getElementById('amt'+id).value);
            val.innerText = activeAmt.toFixed(2) + " PKR";
        } else if(s === 'queued') {
            // Button ka color ab next round waiting state par blue se badal kar perfectly Red template ho chuka hai
            btn.className = 'btn btn-red';
            lbl.innerHTML = 'CANCEL<br>WAIT NEXT ROUND';
            let queuedAmt = queuedBets[id] || parseFloat(document.getElementById('amt'+id).value);
            val.innerText = queuedAmt.toFixed(2) + " PKR";
        }
    }

    function sendBetHistoryToFirebase(betAmt, multiplierValue, statusText) {
        if (!currentUserId) return;
        let now = new Date();
        let dateTimeString = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let winLossAmt = multiplierValue > 0 ? (betAmt * multiplierValue).toFixed(2) : betAmt.toFixed(2);

        db.ref('bet_history/' + currentUserId).push({
            gameName: "Aviator",
            dateTime: dateTimeString,
            betAmount: betAmt,
            winLossAmount: winLossAmt,
            status: statusText
        });
    }

    function updateDB(o) { db.ref('users/' + currentUserId + '/balance').transaction(c => (c || 0) + o); }

    function generateBots() {
        const names = ["Sajad", "Ali", "Bilal", "Khan", "Umer", "Hamza", "Zahid", "Usman", "Kashif", "Zeeshan", "Zain", "Dawood", "Waqas", "Asif", "Rizwan", "Farhan", "Nabeel", "Junaid", "Kamran", "Faisal"];
        const realisticBotBets = [16000, 12899, 8976, 5823, 3890, 14500, 11200, 9500, 7650, 4320, 2500, 1200, 850, 500];
        
        botList = []; 
        totalBetRound = 0; 
        let totalCount = 15; 
        
        for(let i = 0; i < totalCount; i++) {
            let bAmt = realisticBotBets[Math.floor(Math.random() * realisticBotBets.length)];
            botList.push({
                user: names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99), 
                bet: bAmt, 
                x: "-", 
                win: "-", 
                target: parseFloat((1.1 + Math.random() * 4.5).toFixed(2)) 
            });
            totalBetRound += bAmt;
        }

        let realUserB = 0;
        let realUserCount = 0;
        [1, 2].forEach(id => {
            if(pStates[id] === 'waiting' || pStates[id] === 'playing') {
                let activeAmt = activeUserBetsThisRound[id] ? activeUserBetsThisRound[id].amt : parseFloat(document.getElementById('amt' + id).value || 0);
                realUserB += activeAmt;
                realUserCount++;
            }
        });
        
        totalBetRound += realUserB;
        document.getElementById('total-bet-count').innerText = botList.length + realUserCount;
        document.getElementById('total-bet-amt').innerText = totalBetRound.toFixed(0);
        refreshTable();
    }

    function updateHistory(m) {
        let h = document.getElementById('hist');
        let s = document.createElement('span');
        s.innerText = m + "x";
        let val = parseFloat(m);
        let cls = val >= 10 ? 'pink' : (val >= 2 ? 'purple' : 'blue');
        s.className = cls;
        h.insertBefore(s, h.firstChild); 
        fullHist.unshift({val: m, class: cls});
        if(fullHist.length > 30) fullHist.pop();
        if(h.children.length > 12) h.removeChild(h.lastChild);
    }
