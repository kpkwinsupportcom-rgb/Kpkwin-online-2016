<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK-WIN Aviator Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; user-select: none; }
        
        #loading-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .load-content { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .load-kpk { color: #ffc107; font-size: 35px; font-weight: 900; letter-spacing: 2px; }
        .load-aviator { color: #cb011a; font-size: 22px; font-weight: bold; letter-spacing: 8px; margin: 10px 0; }
        .load-spribe { color: #fff; font-size: 14px; letter-spacing: 5px; opacity: 0.8; }
        .dots-container { display: flex; gap: 8px; margin-top: 20px; justify-content: center; }
        .dot { width: 10px; height: 10px; background: #cb011a; border-radius: 50%; animation: dotAnim 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotAnim { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

        #connecting-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1b1f 0%, #000 100%);
            z-index: 99998; display: none; justify-content: center; align-items: center;
        }
        .conn-box { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255, 193, 7, 0.1);
            border-top: 4px solid #ffc107; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .conn-text { color: #fff; font-size: 20px; font-weight: bold; letter-spacing: 4px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .server-info { color: #444; font-size: 10px; margin-top: 10px; text-transform: uppercase; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: #2c2d30; color: #fff; border: 1px solid #444; padding: 6px 16px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #1c1d21; border-radius: 10px; align-items: center; border-bottom: 2px solid #ffc107; }
        .bal-val { color: #28a745; font-weight: bold; font-size: 18px; }
        
        #custom-alert {
            display: none; position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(28, 29, 33, 0.98); color: #ffc107; padding: 12px 25px; border-radius: 10px;
            z-index: 10000; font-weight: bold; border: 1px solid #ffc107; text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); animation: alertAnim 0.3s ease-out; font-size: 16px;
        }
        @keyframes alertAnim { from { opacity: 0; transform: translate(-50%, -70%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        .hist-wrapper { display: flex; align-items: center; gap: 5px; background: #000; padding: 2px 0; border-bottom: 1px solid #333; }
        .history-bar { display: flex; gap: 8px; padding: 10px 5px; overflow-x: hidden; flex: 1; flex-direction: row; justify-content: flex-start; }
        .history-bar span { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; min-width: 45px; text-align: center; }
        .blue { color: #34b1ff; border: 1px solid #34b1ff; background: rgba(52, 177, 255, 0.1); }
        .purple { color: #913ef8; border: 1px solid #913ef8; background: rgba(145, 62, 248, 0.1); }
        .pink { color: #c01ceb; border: 1px solid #c01ceb; background: rgba(192, 28, 235, 0.15); }
        .hist-icon { color: #888; font-size: 18px; padding: 0 10px; cursor: pointer; font-weight: bold;}

        #hist-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding-top: 20px; }
        .modal-content { background: #1c1d21; width: 90%; margin: auto; border-radius: 15px; padding: 15px; border: 1px solid #444; }
        .close-hist { float: right; color: #ffc107; font-size: 20px; font-weight: bold; cursor: pointer; }

        .game-area { 
            background: radial-gradient(circle at center, #1b1c21 0%, #000000 100%); 
            height: 220px; border-radius: 15px; position: relative; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border: 1px solid #333; margin-top: 5px; 
        }
        .game-area::before { 
            content: ""; position: absolute; width: 200%; height: 200%; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); 
            background-size: 45px 45px; transform: perspective(500px) rotateX(60deg); 
            bottom: -50%; animation: moveGrid 4s linear infinite; z-index: 0; 
        }
        @keyframes moveGrid { 0% { transform: perspective(500px) rotateX(60deg) translateY(0); } 100% { transform: perspective(500px) rotateX(60deg) translateY(45px); } }
        
        #multiplier { font-size: 60px; font-weight: 900; z-index: 15; text-align: center; width: 100%; color: white; pointer-events: none; position: relative; }
        .logo-box { position: absolute; top: 20%; padding: 15px 30px; background: rgba(44, 45, 48, 0.8); border: 2px solid #444; border-radius: 15px; text-align: center; z-index: 25; }
        #countdown-timer { position: absolute; bottom: 40px; width: 100%; text-align: center; display: none; z-index: 20; }
        .progress-container { width: 60%; height: 5px; background: #333; margin: 8px auto; border-radius: 10px; overflow: hidden; }
        #progress-line { width: 100%; height: 100%; background: #cb011a; transition: width 0.1s linear; }

        .bet-stats { display: flex; justify-content: space-between; padding: 10px; background: #1c1d21; margin-top: 10px; border-radius: 10px; font-size: 12px; border: 1px solid #333; }
        .stat-val { display: block; font-weight: bold; color: #ffc107; font-size: 14px; }
        
        .bet-box { background: #1c1d21; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-top: 10px; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .input-part { background: #000; border-radius: 20px; border: 1px solid #444; padding: 5px 12px; display: flex; align-items: center; }
        .input-part input { background: none; border: none; color: white; width: 75px; text-align: center; font-size: 18px; font-weight: bold; outline: none; }
        
        .quick-bet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 8px; width: 120px; }
        .q-btn { background: #2c2d30; border: 1px solid #444; color: #fff; padding: 4px; border-radius: 5px; font-size: 10px; cursor: pointer; }

        .btn { width: 140px; height: 55px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; }
        .btn-green { background: #28a745; color: white; box-shadow: 0 4px 0 #1e7e34; } 
        .btn-red { background: #cb011a; color: white; box-shadow: 0 4px 0 #a00114; }   
        .btn-orange { background: #ffc107; color: black; box-shadow: 0 4px 0 #d39e00; }

        .table-tabs { display: flex; background: #1c1d21; border-radius: 20px; margin-top: 15px; padding: 4px; border: 1px solid #333; }
        .tab-btn { flex: 1; border: none; background: none; color: #888; padding: 10px; border-radius: 18px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #2c2d30; color: #fff; }
        
        .tabs-container { margin-top: 8px; background: #1c1d21; border-radius: 15px; border: 1px solid #333; min-height: 250px; overflow: hidden; }
        .list-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; color: #fff; }
        .list-table th { background: rgba(255,255,255,0.05); padding: 12px 10px; color: #888; font-weight: normal; }
        .list-table td { padding: 12px 10px; border-bottom: 1px solid #25272c; }
    </style>
</head>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUserId = sessionStorage.getItem("currentUserId");
    let balance = 0, mult = 1.00, isFlying = false, totalWinRound = 0, totalBetRound = 0;
    let pStates = { 1: 'ready', 2: 'ready' }, botList = [], myHistory = [], fullHist = [], currentTab = 'all';

    // --- ADDED CYCLE VARIABLES (FIX FOR STICKING) ---
    let roundCounter = 0;
    let totalBetsCycle = 0;
    let totalPayoutCycle = 0;

    function initFirebase() {
        if(!currentUserId) { window.location.href='index.html'; return; }
        setTimeout(() => {
            document.getElementById('loading-page').style.display = 'none';
            document.getElementById('connecting-page').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('connecting-page').style.display = 'none';
                startCountdown();
            }, 2000); 
        }, 3000);
        db.ref('users/' + currentUserId + '/balance').on('value', s => {
            balance = parseFloat(s.val() || 0);
            document.getElementById('main-balance').innerText = balance.toFixed(2);
        });
    }

    function showCustomAlert(msg, type='error') {
        let el = document.getElementById('custom-alert');
        el.innerText = msg;
        if(type === 'win') {
            el.style.color = '#ffc107'; el.style.borderColor = '#ffc107'; el.style.background = 'rgba(28, 29, 33, 0.98)';
        } else {
            el.style.color = 'white'; el.style.borderColor = 'white'; el.style.background = 'rgba(203, 1, 26, 0.98)';
        }
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    function toggleHistModal() {
        const m = document.getElementById('hist-modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') {
            document.getElementById('full-hist-list').innerHTML = fullHist.map(h => `<span class="${h.class}" style="font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; border:1px solid; min-width:45px; text-align:center;">${h.val}x</span>`).join('');
        }
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        refreshTable();
    }

    function setAmt(id, v) { 
        document.getElementById('amt'+id).value = v.toFixed(2); 
        if(pStates[id] === 'ready') document.getElementById('val'+id).innerText = v.toFixed(2) + " PKR";
    }

    function adj(id, v) {
        let el = document.getElementById('amt'+id);
        let n = Math.max(10, parseFloat(el.value) + v);
        el.value = n.toFixed(2);
        if(pStates[id] === 'ready') document.getElementById('val'+id).innerText = n.toFixed(2) + " PKR";
    }

    function handle(id) {
        let amt = parseFloat(document.getElementById('amt' + id).value);
        if (pStates[id] === 'ready') {
            if (amt > 16000) { showCustomAlert("MAXIMUM BET IS 16,000 PKR!"); return; }
            if (balance < amt) { showCustomAlert("INSUFFICIENT BALANCE!"); return; }
            updateDB(-amt); updateBtn(id, 'waiting');
            totalBetRound += amt;
        } else if (pStates[id] === 'waiting') {
            updateDB(amt); updateBtn(id, 'ready');
            totalBetRound -= amt;
        } else if (pStates[id] === 'playing' && isFlying) {
            cashOut(id);
        }
    }

    function updateBtn(id, s) {
        pStates[id] = s;
        let btn = document.getElementById('btn'+id), lbl = document.getElementById('lbl'+id), val = document.getElementById('val'+id);
        btn.className = 'btn ' + (s === 'ready' ? 'btn-green' : (s === 'waiting' ? 'btn-red' : 'btn-orange'));
        lbl.innerText = (s === 'ready' ? 'BET' : (s === 'waiting' ? 'CANCEL' : 'CASH OUT'));
        if(s === 'ready') val.innerText = document.getElementById('amt'+id).value + " PKR";
    }

    // --- ADDED CYCLE TRACKING IN CASHOUT ---
    function cashOut(id) {
        let amt = parseFloat(document.getElementById('amt' + id).value);
        let win = amt * mult;
        
        totalPayoutCycle += win; // Track for 100 rounds pool
        
        totalWinRound += win;
        document.getElementById('total-win-amt').innerText = totalWinRound.toFixed(2);
        updateDB(win);
        updateBtn(id, 'ready');
        showCustomAlert("CASH OUT: " + win.toFixed(2) + " PKR", 'win');
        myHistory.unshift({user: "Me", bet: amt, x: mult.toFixed(2), win: win.toFixed(2)});
        refreshTable();
    }

    function updateDB(o) { db.ref('users/' + currentUserId + '/balance').transaction(c => (c || 0) + o); }

    function startCountdown() {
        isFlying = false; mult = 1.00; totalWinRound = 0; totalBetRound = 0; 
        document.getElementById('total-win-amt').innerText = "0.00";
        document.getElementById('multiplier').style.display = "none";
        document.getElementById('multiplier').style.color = "white";
        document.getElementById('logo-container').style.display = "block";
        document.getElementById('countdown-timer').style.display = 'block';
        [1, 2].forEach(id => { if(document.getElementById('autoBet' + id).checked && pStates[id] === 'ready') handle(id); });
        generateBots();
        let count = 5.0;
        let t = setInterval(() => {
            count -= 0.1;
            document.getElementById('sec').innerText = count.toFixed(1) + "s";
            document.getElementById('progress-line').style.width = (count/5)*100 + "%";
            if(count <= 0) { 
                clearInterval(t); 
                document.getElementById('countdown-timer').style.display = 'none'; 
                document.getElementById('logo-container').style.display = "none";
                document.getElementById('multiplier').style.display = "block";
                beginFlight(); 
            }
        }, 100);
    }

function beginFlight() {
    isFlying = true;
    [1, 2].forEach(id => { if(pStates[id] === 'waiting') updateBtn(id, 'playing'); });
    
    roundCounter++;
    totalBetsCycle += (totalBetRound || 0); 
    
    let availablePool = totalBetsCycle * 0.80; 
    let currentDebt = totalPayoutCycle; 
    let chance = Math.random() * 100;
    let crash;

    // --- SMART USER DETECTION (THE "TRAP") ---
    let highestUserBet = 0;
    [1, 2].forEach(id => {
        let amt = parseFloat(document.getElementById('amt'+id).value);
        if (pStates[id] === 'playing' && amt > highestUserBet) highestUserBet = amt;
    });

    if (highestUserBet >= 1000 && chance < 90) {
        crash = 1.00 + (Math.random() * 0.15); 
    }
    else if (highestUserBet < 200 && chance > 80) {
        crash = 10.0 + (Math.random() * 90.0); 
    }
    else if (currentDebt >= availablePool && totalBetRound > 0) {
        crash = 1.00 + (Math.random() * 0.05);
    }
    else {
        if (chance < 40) crash = 1.05 + (Math.random() * 0.45); 
        else crash = 1.50 + (Math.random() * 3.50); 
    }

    if (totalBetRound > 0) {
        let roomLeft = Math.max(0, availablePool - currentDebt);
        if ((totalBetRound * crash) > roomLeft) {
            crash = Math.max(1.01, roomLeft / totalBetRound);
        }
    }

    if (roundCounter >= 100) {
        roundCounter = 0; totalBetsCycle = 0; totalPayoutCycle = 0;
    }

    function update() {
        if (!isFlying) return;
        let growth = mult < 2.0 ? 0.0018 : (mult < 10.0 ? 0.0015 : (mult < 100.0 ? 0.0025 : 0.0040));
        mult += mult * growth; 
        document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";

        [1, 2].forEach(id => {
            if(pStates[id] === 'playing') {
                let amt = parseFloat(document.getElementById('amt'+id).value);
                document.getElementById('val'+id).innerText = (amt * mult).toFixed(2) + " PKR";
                if(document.getElementById('autoCash'+id).checked && mult >= parseFloat(document.getElementById('autoVal'+id).value)) {
                    cashOut(id);
                }
            }
        });

        botList.forEach(b => {
            if(b.win === "-" && mult >= b.target) {
                b.x = mult.toFixed(2); b.win = (b.bet * mult).toFixed(0);
                totalWinRound += parseFloat(b.win);
                document.getElementById('total-win-amt').innerText = totalWinRound.toFixed(0);
                refreshTable();
            }
        });

        if(mult >= crash) {
            isFlying = false;
            document.getElementById('multiplier').style.color = "#cb011a";
            document.getElementById('multiplier').innerText = mult.toFixed(2) + "x\nFLEW AWAY!";
            [1, 2].forEach(id => { if(pStates[id] === 'playing') updateBtn(id, 'ready'); });
            updateHistory(mult.toFixed(2));
            setTimeout(startCountdown, 3000);
        } else requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
}

    function generateBots() {
        const names = ["Sajad", "Ali", "Bilal", "Khan", "Umer", "Hamza", "Zahid", "Usman"];
        botList = []; let totalB = 0;
        for(let i=0; i<12; i++) {
            let bAmt = Math.floor(Math.random()*600 + 50);
            botList.push({user: names[Math.floor(Math.random()*names.length)]+Math.floor(Math.random()*99), bet: bAmt, x: "-", win: "-", target: (Math.random()*3 + 1.1)});
            totalB += bAmt;
        }
        totalBetRound += totalB;
        document.getElementById('total-bet-count').innerText = botList.length;
        document.getElementById('total-bet-amt').innerText = totalBetRound.toFixed(0);
        refreshTable();
    }

    function refreshTable() {
        let target = document.getElementById('table-body');
        let data = (currentTab === 'all') ? botList : (currentTab === 'my' ? myHistory : [...botList].sort((a,b) => b.win - a.win).slice(0,10));
        target.innerHTML = data.map(b => `<tr><td>${b.user}</td><td>${b.bet}</td><td style="color:#ffc107">${b.x}${b.x==='-'||b.x==='Crash'?'':'x'}</td><td style="color:#28a745">${b.win}</td></tr>`).join('');
    }

    function updateHistory(m) {
        let h = document.getElementById('hist');
        let s = document.createElement('span');
        s.innerText = m + "x";
        let val = parseFloat(m);
        let cls = val >= 10 ? 'pink' : (val >= 2 ? 'purple' : 'blue');
        s.className = cls;
        h.insertBefore(s, h.firstChild); 
        fullHist.unshift({val: m, class: cls});
        if(fullHist.length > 30) fullHist.pop();
        if(h.children.length > 12) h.removeChild(h.lastChild);
    }
</script>
