    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; user-select: none; }
        
        #loading-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

        .load-content { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .load-spribe { color: #fff; font-size: 14px; letter-spacing: 5px; opacity: 0.8; }
        .dots-container { display: flex; gap: 8px; margin-top: 20px; justify-content: center; }
        .dot { width: 10px; height: 10px; background: #cb011a; border-radius: 50%; animation: dotAnim 1.4s infinite; }

        .dot:nth-child(3) { animation-delay: 0.4s; }

        #connecting-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1b1f 0%, #000 100%);

        }
        .conn-box { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255, 193, 7, 0.1);
            border-top: 4px solid #ffc107; border-radius: 50%;

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .conn-text { color: #fff; font-size: 20px; font-weight: bold; letter-spacing: 4px; animation: blink 1s infinite; }

        .sound-btn { background: #2c2d30; color: #ffc107; border: 1px solid #ffc107; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        .header { display: flex; justify-content: space-between; padding: 10px; background: #1c1d21; border-radius: 10px; align-items: center; border-bottom: 2px solid #ffc107; }

        #custom-alert {
            display: none; position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(28, 29, 33, 0.98); color: #ffc107; padding: 12px 25px; border-radius: 10px;

            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); animation: alertAnim 0.3s ease-out; font-size: 16px;
        }
        @keyframes alertAnim { from { opacity: 0; transform: translate(-50%, -70%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        .hist-wrapper { display: flex; align-items: center; gap: 5px; background: #000; padding: 2px 0; border-bottom: 1px solid #333; }
        .history-bar { display: flex; gap: 8px; padding: 10px 5px; overflow-x: hidden; flex: 1; flex-direction: row; justify-content: flex-start; }
        .history-bar span { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; min-width: 45px; text-align: center; }
        .blue { color: #34b1ff; border: 1px solid #34b1ff; background: rgba(52, 177, 255, 0.1); }
        .purple { color: #913ef8; border: 1px solid #913ef8; background: rgba(145, 62, 248, 0.1); }

        #hist-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding-top: 20px; }

        .game-area {

        .q-btn { background: #2c2d30; border: 1px solid #444; color: #fff; padding: 4px; border-radius: 5px; font-size: 10px; cursor: pointer; }

        .btn { width: 140px; height: 55px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; }

        .sub-tab-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 4px 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .sub-tab-btn.active { background: #ffc107; color: black; border-color: #ffc107; }

        .tabs-container { margin-top: 8px; background: #1c1d21; border-radius: 15px; border: 1px solid #333; min-height: 250px; overflow: hidden; }
        .list-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; color: #fff; }
        .list-table th { background: rgba(255,255,255,0.05); padding: 12px 10px; color: #888; font-weight: normal; }
        .list-table td { padding: 12px 10px; border-bottom: 1px solid #25272c; }
    </style>
</head>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYzGgpU8OBX2rQXkqVrafgtfMK896zJtA", databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUserId = sessionStorage.getItem("currentUserId");
    let balance = 0, mult = 1.00, isFlying = false, totalWinRound = 0, totalBetRound = 0;
    let pStates = { 1: 'ready', 2: 'ready' }, botList = [], myHistory = [], fullHist = [], currentTab = 'all', currentSubTab = 'daily';

    let roundCounter = 0;
    let totalBetsCycle = 0;
    let totalPayoutCycle = 0;
    let adminProfitRate = 20; 

    let activeUserBetsThisRound = {};
    let lastSyncedState = ""; 

    // SOUND SETUP (FIXED VARIABLES AND PATHS)
    let soundEnabled = true;
    const tickSound = new Audio('fly.mp3'); // Tick sound hatm, fly audio linked
    const flySound = new Audio('fly.mp3');
    const winSound = new Audio('win.mp3');   // Cashout sound
    const crashSound = new Audio('crash.mp3');
    
    flySound.loop = true;
    tickSound.loop = true;

    // Browser restrictions bypass trigger
    document.addEventListener('click', () => {
        if(soundEnabled) {
            [tickSound, flySound, winSound, crashSound].forEach(audio => {
                if(audio.paused && audio.currentTime === 0) {
                    audio.play().then(() => audio.pause()).catch(() => {});
                }
            });
        }
    }, { once: true });

    function playSound(sound) {
        if (soundEnabled) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Audio play context restricted: ", e));
        }
    }

    function stopSound(sound) {
        sound.pause();
        sound.currentTime = 0;
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('sound-status').innerText = soundEnabled ? "ON" : "OFF";
        document.getElementById('sound-icon').innerText = soundEnabled ? "🔊" : "🔇";
        if (!soundEnabled) {
            stopSound(flySound);
            stopSound(tickSound);
            stopSound(winSound);
            stopSound(crashSound);
        }
    }

    function initFirebase() {
        if(!currentUserId) { 
            showCustomAlert("SESSION MISSING! Please open through login.html", "error");
            setTimeout(() => { window.location.href='index.html'; }, 3000);
            return; 
        }
        setTimeout(() => {
            document.getElementById('loading-page').style.display = 'none';
            document.getElementById('connecting-page').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('connecting-page').style.display = 'none';
                listenToGlobalGameRoom();
            }, 2000); 
        }, 3000);

        db.ref('users/' + currentUserId + '/balance').on('value', s => {
            balance = parseFloat(s.val() || 0);
            document.getElementById('main-balance').innerText = balance.toFixed(2);
        });

        db.ref('onlineGames').on('value', snap => {
            if(snap.exists()) {
                snap.forEach(child => {
                    if(child.val().name === "Aviator") {
                        adminProfitRate = parseFloat(child.val().profitPercent || 20);
                    }
                });
            }
        });
    }

    function listenToGlobalGameRoom() {
        db.ref('aviator_room').on('value', snap => {
            if (!snap.exists()) {
                createNewRoundData();
                return;
            }
            
            let data = snap.val();
            
            roundCounter = data.roundCounter || 0;
            totalBetsCycle = data.totalBetsCycle || 0;
            totalPayoutCycle = data.totalPayoutCycle || 0;

            if (data.state === "countdown") {
                if (lastSyncedState !== "countdown") {
                    lastSyncedState = "countdown";
                    runGlobalCountdown(data.countdownTime);
                }
            } else if (data.state === "flying") {
                if (lastSyncedState !== "flying") {
                    lastSyncedState = "flying";
                    runGlobalFlight(data.crashPoint);
                }
            } else if (data.state === "crashed") {
                if (lastSyncedState !== "crashed") {
                    lastSyncedState = "crashed";
                    triggerFlewAway(data.crashPoint);
                }
            }
        });
    }

    function createNewRoundData() {
        let calculatedCrashPoint = calculateProfitSafeCrash();
        
        let nextRoundCount = roundCounter + 1;
        let nextTotalBets = totalBetsCycle;
        let nextTotalPayout = totalPayoutCycle;
        
        if (nextRoundCount > 20) {
            nextRoundCount = 1;
            nextTotalBets = 0;
            nextTotalPayout = 0;
        }

        db.ref('aviator_room').set({
            state: "countdown",
            countdownTime: 5.0,
            currentMult: 1.00,
            crashPoint: calculatedCrashPoint,
            roundCounter: nextRoundCount,
            totalBetsCycle: nextTotalBets,
            totalPayoutCycle: nextTotalPayout,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function calculateProfitSafeCrash() {
        let userPayoutFactor = (100 - adminProfitRate) / 100; 
        let totalAllowedUserPayoutForCycle = totalBetsCycle * userPayoutFactor; 
        let currentCyclePayout = totalPayoutCycle; 
        
        let chance = Math.random() * 100;
        let crash;

        if (currentCyclePayout >= totalAllowedUserPayoutForCycle && totalBetsCycle > 0) {
            crash = 1.01 + (Math.random() * 0.14); 
        } else {
            if (chance < 35) { 
                crash = 1.10 + (Math.random() * 0.70);
            } else if (chance < 85) {
                crash = 2.00 + (Math.random() * 3.00);
            } else {
                let maxSafeJump = Math.min(30.0, (totalAllowedUserPayoutForCycle - currentCyclePayout) / 100);
                if (maxSafeJump < 5.0) maxSafeJump = 5.0;
                crash = 5.00 + (Math.random() * (maxSafeJump - 5.00));
            }
        }
        return parseFloat(crash.toFixed(2));
    }

    function runGlobalCountdown(initialCount) {
        isFlying = false; mult = 1.00; totalWinRound = 0; totalBetRound = 0; 
        activeUserBetsThisRound = {}; 
        
        stopSound(flySound); 
        stopSound(tickSound);
        
        // Countdown start hote hi fly audio play ho jaye loop par
        if(soundEnabled) {
            flySound.play().catch(e => console.log(e));
        }
        
        document.getElementById('total-win-amt').innerText = "0.00";
        document.getElementById('multiplier').style.display = "none";
        document.getElementById('multiplier').style.color = "white";
        document.getElementById('logo-container').style.display = "block";
        document.getElementById('countdown-timer').style.display = 'block';
        
        [1, 2].forEach(id => { if(document.getElementById('autoBet' + id).checked && pStates[id] === 'ready') handle(id); });
        generateBots();

        let count = initialCount;

        let interval = setInterval(() => {
            count -= 0.1;

            if(count <= 0) {
                clearInterval(interval);
                db.ref('aviator_room/state').transaction(curr => curr === "countdown" ? "flying" : curr);
            } else {
                document.getElementById('sec').innerText = count.toFixed(1) + "s";
                document.getElementById('progress-line').style.width = (count/5)*100 + "%";
            }
        }, 100);
    }

    function runGlobalFlight(targetCrashPoint) {
        isFlying = true;
        document.getElementById('countdown-timer').style.display = 'none'; 
        document.getElementById('logo-container').style.display = "none";
        document.getElementById('multiplier').style.display = "block";
        
        // Agar countdown se fly play ho raha hai to adjust continuous playback
        if(soundEnabled && flySound.paused) {
            flySound.play().catch(e => console.log(e));
        }

        [1, 2].forEach(id => { if(pStates[id] === 'waiting') updateBtn(id, 'playing'); });

        let realUserBetsThisRound = 0;
        [1, 2].forEach(id => {
            if(pStates[id] === 'playing') {
                realUserBetsThisRound += parseFloat(document.getElementById('amt'+id).value || 0);
            }
        });
        
        if(realUserBetsThisRound > 0 && lastSyncedState === "flying") {
            db.ref('aviator_room/totalBetsCycle').transaction(c => (c || 0) + realUserBetsThisRound);
        }

        function updateLoop() {
            if (!isFlying || lastSyncedState !== "flying") return;
            
            let growth = mult < 2.0 ? 0.0018 : (mult < 10.0 ? 0.0015 : (mult < 100.0 ? 0.0025 : 0.0040));
            mult += mult * growth; 
            document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";

            [1, 2].forEach(id => {
                if(pStates[id] === 'playing') {
                    let amt = parseFloat(document.getElementById('amt'+id).value);
                    document.getElementById('val'+id).innerText = (amt * mult).toFixed(2) + " PKR";
                    if(document.getElementById('autoCash'+id).checked && mult >= parseFloat(document.getElementById('autoVal'+id).value)) {
                        cashOut(id);
                    }
                }
            });

            botList.forEach(b => {
                if(b.win === "-" && mult >= b.target) {
                    b.x = mult.toFixed(2); b.win = (b.bet * mult).toFixed(0);
                    totalWinRound += parseFloat(b.win);
                    document.getElementById('total-win-amt').innerText = totalWinRound.toFixed(0);
                    refreshTable();
                }
            });

            if (mult >= targetCrashPoint) {
                db.ref('aviator_room/state').transaction(curr => curr === "flying" ? "crashed" : curr);
            } else {
                requestAnimationFrame(updateLoop);
            }
        }
        requestAnimationFrame(updateLoop);
    }

    function triggerFlewAway(finalCrash) {
        isFlying = false;
        
        stopSound(flySound);     
        stopSound(tickSound);     
        playSound(crashSound);   

        document.getElementById('multiplier').style.color = "#cb011a";
        document.getElementById('multiplier').innerHTML = finalCrash.toFixed(2) + "x<br><span style='font-size: 20px; font-weight: bold; display: block; margin-top: -5px;'>FLEW AWAY!</span>";
        
        Object.keys(activeUserBetsThisRound).forEach(id => {
            if(activeUserBetsThisRound[id] && !activeUserBetsThisRound[id].saved) {
                sendBetHistoryToFirebase(activeUserBetsThisRound[id].amt, 0, "loss");
            }
        });

        [1, 2].forEach(id => { updateBtn(id, 'ready'); });
        updateHistory(finalCrash.toFixed(2));
        
        setTimeout(() => {
            createNewRoundData();
        }, 3000);
    }

    function showCustomAlert(msg, type='error') {
        let el = document.getElementById('custom-alert');
        el.innerText = msg;
        if(type === 'win') {
            el.style.color = '#ffc107'; el.style.borderColor = '#ffc107'; el.style.background = 'rgba(28, 29, 33, 0.98)';
        } else {
            el.style.color = 'white'; el.style.borderColor = 'white'; el.style.background = 'rgba(203, 1, 26, 0.98)';
        }
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    function toggleHistModal() {
        const m = document.getElementById('hist-modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') {
            document.getElementById('full-hist-list').innerHTML = fullHist.map(h => `<span class="${h.class}" style="font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; border:1px solid; min-width:45px; text-align:center;">${h.val}x</span>`).join('');
        }
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        
        if(t === 'top') {
            document.getElementById('top-filters').style.display = 'flex';
        } else {
            document.getElementById('top-filters').style.display = 'none';
        }
        refreshTable();
    }

    function switchSubTab(st) {
        currentSubTab = st;
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sub-' + st).classList.add('active');
        refreshTable();
    }

    function cashOut(id) {
        if(pStates[id] !== 'playing' || !isFlying) return; 

        let amt = parseFloat(document.getElementById('amt' + id).value);
        let win = amt * mult;
        
        playSound(winSound); 

        db.ref('aviator_room/totalPayoutCycle').transaction(c => (c || 0) + win);
        totalWinRound += win;
        document.getElementById('total-win-amt').innerText = totalWinRound.toFixed(2);
        
        updateDB(win);
        updateBtn(id, 'ready'); 
        showCustomAlert("CASH OUT: " + win.toFixed(2) + " PKR", 'win');
        
        myHistory.unshift({user: "Me", bet: amt, x: mult.toFixed(2), win: win.toFixed(2)});
        refreshTable();

        sendBetHistoryToFirebase(amt, mult, "win");
        if(activeUserBetsThisRound[id]) activeUserBetsThisRound[id].saved = true;
    }

    function setAmt(id, v) { 
        document.getElementById('amt'+id).value = v.toFixed(2); 
        if(pStates[id] === 'ready') document.getElementById('val'+id).innerText = v.toFixed(2) + " PKR";
    }

    function adj(id, v) {
        let el = document.getElementById('amt'+id);
        let n = Math.max(10, parseFloat(el.value) + v);
        el.value = n.toFixed(2);
        if(pStates[id] === 'ready') document.getElementById('val'+id).innerText = n.toFixed(2) + " PKR";
    }

    function handle(id) {
        let amt = parseFloat(document.getElementById('amt' + id).value);
        if (pStates[id] === 'ready') {
            if (amt > 16000) { showCustomAlert("MAXIMUM BET IS 16,000 PKR!"); return; }
            if (balance < amt) { showCustomAlert("INSUFFICIENT BALANCE!"); return; }
            updateDB(-amt); updateBtn(id, 'waiting');
            totalBetRound += amt;
            activeUserBetsThisRound[id] = { amt: amt, saved: false };
        } else if (pStates[id] === 'waiting') {
            updateDB(amt); updateBtn(id, 'ready');
            totalBetRound -= amt;
            delete activeUserBetsThisRound[id];
        } else if (pStates[id] === 'playing' && isFlying) {
            cashOut(id);
        }
        refreshTable(); 
    }

    function updateBtn(id, s) {
        pStates[id] = s;
        let btn = document.getElementById('btn'+id), lbl = document.getElementById('lbl'+id), val = document.getElementById('val'+id);
        btn.className = 'btn ' + (s === 'ready' ? 'btn-green' : (s === 'waiting' ? 'btn-red' : 'btn-orange'));
        lbl.innerText = (s === 'ready' ? 'BET' : (s === 'waiting' ? 'CANCEL' : 'CASH OUT'));
        if(s === 'ready') val.innerText = document.getElementById('amt'+id).value + " PKR";
    }

    function sendBetHistoryToFirebase(betAmt, multiplierValue, statusText) {
        if (!currentUserId) return;
        let now = new Date();
        let dateTimeString = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let winLossAmt = multiplierValue > 0 ? (betAmt * multiplierValue).toFixed(2) : betAmt.toFixed(2);

        db.ref('bet_history/' + currentUserId).push({
            gameName: "Aviator",
            dateTime: dateTimeString,
            betAmount: betAmt,
            winLossAmount: winLossAmt,
            status: statusText
        });
    }

    function updateDB(o) { db.ref('users/' + currentUserId + '/balance').transaction(c => (c || 0) + o); }

    function generateBots() {
        const names = ["Sajad", "Ali", "Bilal", "Khan", "Umer", "Hamza", "Zahid", "Usman", "Kashif", "Zeeshan", "Yasir", "Sawab"];
        const customHighBets = [68000, 67899, 55000, 45000, 32000, 24500, 18000, 16000, 12500, 10000, 9500, 8987];
        
        botList = []; 
        totalBetRound = 0; 
        
        let totalCount = 15; 
        
        for(let i = 0; i < totalCount; i++) {
            let bAmt = customHighBets[Math.floor(Math.random() * customHighBets.length)];
            botList.push({
                user: names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99), 
                bet: bAmt, 
                x: "-", 
                win: "-", 
                target: (Math.random() * 4 + 1.1)
            });
            totalBetRound += bAmt;
        }

        let realUserB = 0;
        let realUserCount = 0;
        [1, 2].forEach(id => {
            if(pStates[id] === 'waiting' || pStates[id] === 'playing') {
                realUserB += parseFloat(document.getElementById('amt' + id).value || 0);
                realUserCount++;
            }
        });
        
        totalBetRound += realUserB;
        
        document.getElementById('total-bet-count').innerText = botList.length + realUserCount;
        document.getElementById('total-bet-amt').innerText = totalBetRound.toFixed(0);
        
        refreshTable();
    }

    function refreshTable() {
        let target = document.getElementById('table-body');
        let data = [];

        if (currentTab === 'all') {
            data = [...botList];
            
            [1, 2].forEach(id => {
                if(pStates[id] === 'waiting' || pStates[id] === 'playing') {
                    let uAmt = parseFloat(document.getElementById('amt' + id).value || 0);
                    data.push({
                        user: "Me (Slot " + id + ")",
                        bet: uAmt,
                        x: pStates[id] === 'playing' ? mult.toFixed(2) : "-",
                        win: pStates[id] === 'ready' ? (uAmt * mult).toFixed(0) : "-"
                    });
                }
            });

            data.sort((a, b) => b.bet - a.bet);

        } else if (currentTab === 'my') {
            data = myHistory;
        } else if (currentTab === 'top') {
            let multiplierFactor = 1;
            if (currentSubTab === 'weekly') multiplierFactor = 2.5;
            if (currentSubTab === 'monthly') multiplierFactor = 5.2;
            if (currentSubTab === 'yearly') multiplierFactor = 12.4;

            data = botList.map(b => {
                let simulatedBet = Math.floor(b.bet * multiplierFactor);
                let simulatedWin = b.win !== "-" ? Math.floor(parseFloat(b.win) * multiplierFactor) : Math.floor(simulatedBet * b.target);
                let simulatedX = b.x !== "-" ? b.x : b.target.toFixed(2);
                return { user: b.user, bet: simulatedBet, x: simulatedX, win: simulatedWin };
            });
            
            data.sort((a, b) => b.bet - a.bet);
            data = data.slice(0, 10);
        }

        target.innerHTML = data.map(b => `<tr><td>${b.user}</td><td>${b.bet}</td><td style="color:#ffc107">${b.x}${b.x==='-'||b.x==='Crash'?'':'x'}</td><td style="color:#28a745">${b.win}</td></tr>`).join('');
    }

    function updateHistory(m) {
        let h = document.getElementById('hist');
        let s = document.createElement('span');
        s.innerText = m + "x";
        let val = parseFloat(m);
        let cls = val >= 10 ? 'pink' : (val >= 2 ? 'purple' : 'blue');
        s.className = cls;
        h.insertBefore(s, h.firstChild); 
        fullHist.unshift({val: m, class: cls});
        if(fullHist.length > 30) fullHist.pop();
        if(h.children.length > 12) h.removeChild(h.lastChild);
    }
</script>
