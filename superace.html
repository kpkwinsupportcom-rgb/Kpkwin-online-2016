<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK WIN - Wild Bounty Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #ff9900; --blue: #00ffff; }
        body { background: #000; color: white; font-family: Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* ORIGINAL LOADING PAGE FROM SCREENSHOT */
        #game-start-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/Yasir-Khan-Developer/assets/main/wild-bounty-bg.jpg') no-repeat center center;
            background-size: cover; z-index: 10000; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 100px;
        }
        .loading-bar-container { width: 80%; height: 15px; background: rgba(0,0,0,0.7); border-radius: 20px; border: 2px solid #555; overflow: hidden; margin-bottom: 20px; }
        .loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9900, #fff); animation: load 4s forwards; }
        @keyframes load { 100% { width: 100%; } }

        /* HEADER & BACK BUTTON FIX */
        .header-section { background: #000; border-bottom: 2px solid var(--gold); padding: 5px; position: relative; text-align: center; }
        .back-btn { position: absolute; top: 5px; right: 10px; background: #ff0000; color: #fff; border: 2px solid #fff; border-radius: 8px; padding: 5px 12px; font-weight: bold; cursor: pointer; z-index: 50; }
        .header-text { font-size: 14px; color: var(--gold); font-weight: bold; margin: 0; }
        .sub-header-text { font-size: 8px; color: var(--blue); margin: 0; } /* Text size reduced as requested */

        .game-container { width: 385px; border: 3px solid var(--gold); border-radius: 15px; background: #111; overflow: hidden; position: relative; }
        
        header { display: flex; justify-content: space-between; padding: 10px 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
        #user-id { color: var(--gold); font-weight: bold; font-size: 14px; }
        .balance { color: #00ff00; font-weight: 900; }

        /* GRID & REELS */
        .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #00332a; padding: 10px; margin: 10px; border-radius: 10px; border: 2px solid #001a14; }
        .reel { display: flex; flex-direction: column; gap: 8px; }
        .card { height: 60px; background: #fff; border-radius: 5px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 18px; }
        .card img { width: 30px; height: 30px; }
        .starker { background: radial-gradient(circle, #fff, #ff9900); font-size: 9px; text-align: center; }

        /* CONTROLS */
        .bet-box { background: #000; padding: 15px; text-align: center; }
        .bet-adjust { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 10px; }
        .btn-m { width: 45px; height: 45px; background: var(--gold); border: none; border-radius: 8px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn-q { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 4px; font-size: 12px; margin: 2px; cursor: pointer; }

        .spin-section { display: flex; justify-content: space-around; align-items: center; padding: 10px; background: #000; }
        #spin-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: radial-gradient(circle, #ffcc00, #ff8800); font-weight: 900; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body onload="initApp()">

<div id="game-start-loading">
    <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
    <div style="color:white; font-size:12px;">Loading [0%]... Please wait</div>
</div>

<div class="game-container">
    <div class="header-section">
        <button class="back-btn" onclick="window.location.replace('index.html')">BACK</button>
        <p class="header-text">SUPER ACE ONLINE CASINO</p>
        <p class="sub-header-text">MAX WIN 15000X | KPK WIN Y---R VERSION 1.0</p>
    </div>

    <header>
        <div id="user-id">Anya</div>
        <div class="balance">Rs <span id="user-bal">0.00</span></div>
    </header>

    <div class="slot-grid" id="grid">
        <div class="reel" id="r0"></div>
        <div class="reel" id="r1"></div>
        <div class="reel" id="r2"></div>
        <div class="reel" id="r3"></div>
    </div>

    <div class="bet-box">
        <div class="bet-adjust">
            <button class="btn-m" onclick="changeBet(-10)">-</button>
            <div><span style="font-size:10px; color:#888;">TOTAL BET</span><br><span id="bet-val" style="font-size:24px; color:gold; font-weight:bold;">10</span></div>
            <button class="btn-m" onclick="changeBet(10)">+</button>
        </div>
        <button class="btn-q" onclick="setBet(10)">10</button>
        <button class="btn-q" onclick="setBet(100)">100</button>
        <button class="btn-q" onclick="setBet(500)">500</button>
        <button class="btn-q" onclick="setBet(1000)">1000</button>
    </div>

    <div class="spin-section">
        <div style="text-align:center;">WINNING<br><span id="win-label" style="color:gold;">0.00</span></div>
        <button id="spin-btn">SPIN</button>
        <div style="text-align:center;">FREE SPINS<br><span id="fs-label" style="color:var(--blue);">0</span></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = sessionStorage.getItem("currentUserId") || "User";
    let bal = 0, bet = 10, fs = 0;

    function initApp() {
        db.ref('users/' + uid).on('value', s => {
            let d = s.val() || {};
            bal = d.balance || 0;
            document.getElementById('user-bal').innerText = bal.toFixed(2);
            document.getElementById('user-id').innerText = d.username || "Anya";
        });
        setTimeout(() => document.getElementById('game-start-loading').style.display='none', 4000);
    }

    function changeBet(v) { bet = Math.max(10, bet + v); document.getElementById('bet-val').innerText = bet; }
    function setBet(v) { bet = v; document.getElementById('bet-val').innerText = bet; }

    const icons = [
        {n:'J', v:2, i:'🤵'}, {n:'Q', v:3, i:'👸'}, {n:'K', v:3, i:'🤴'}, {n:'A', v:5, i:'💎'}
    ];

    function createItem(isS = false) {
        let d = document.createElement('div');
        d.className = 'card';
        if(isS) {
            d.classList.add('starker');
            d.innerHTML = "💰<br>STARKER";
            d.dataset.name = "S";
        } else {
            let o = icons[Math.floor(Math.random()*icons.length)];
            d.innerHTML = `<span>${o.i}</span><span>${o.n}</span>`;
            d.dataset.name = o.n;
            d.dataset.val = o.v;
        }
        return d;
    }

    document.getElementById('spin-btn').onclick = function() {
        if(bal < bet && fs === 0) return alert("Paisa kam hai!");

        if(fs > 0) { fs--; document.getElementById('fs-label').innerText = fs; }
        else { db.ref('users/'+uid+'/balance').transaction(b => (b||0) - bet); }

        this.disabled = true;
        let res = [[],[],[],[]], sc = 0;

        for(let i=0; i<4; i++) {
            let r = document.getElementById('r'+i); r.innerHTML = '';
            for(let j=0; j<4; j++) {
                let isS = Math.random() > 0.98; // ADMIN PROFIT 70% (Very low starker)
                if(isS) sc++;
                let card = createItem(isS);
                r.appendChild(card);
                res[i].push({n: card.dataset.name, v: card.dataset.val});
            }
        }

        setTimeout(() => {
            if(sc >= 3 && fs === 0) { fs = 8; document.getElementById('fs-label').innerText = 8; }

            let win = 0;
            // 70% ADMIN PROFIT - Winning only 20% of the time
            if(Math.random() < 0.20) {
                icons.forEach(sym => {
                    if(res[0].some(c=>c.n==sym.n) && res[1].some(c=>c.n==sym.n) && res[2].some(c=>c.n==sym.n)) {
                        let count = res[0].filter(c=>c.n==sym.n).length + res[1].filter(c=>c.n==sym.n).length + res[2].filter(c=>c.n==sym.n).length;
                        win += (count * sym.v);
                    }
                });
            }

            if(win > 0) {
                db.ref('users/'+uid+'/balance').transaction(b => (b||0) + win);
                document.getElementById('win-label').innerText = win.toFixed(2);
            } else {
                document.getElementById('win-label').innerText = "0.00";
            }
            document.getElementById('spin-btn').disabled = false;
        }, 600);
    }

    // Init Grid
    for(let i=0; i<4; i++) { for(let j=0; j<4; j++) document.getElementById('r'+i).appendChild(createItem()); }
</script>
</body>
</html>
