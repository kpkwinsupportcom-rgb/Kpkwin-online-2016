<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK WIN - Super Ace Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #ff9900; --blue: #00ffff; }
        body { 
            background: #000; 
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white; font-family: Arial, sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; 
        }

        /* --- LOADING SCREEN WITH FLOATING ICONS --- */
        #loading-screen {
            position: fixed; inset: 0; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 50000; text-align: center;
            overflow: hidden;
            transition: 0.5s;
        }
        .load-bg-icons {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; opacity: 0.3;
        }
        .floating-icon {
            position: absolute; font-size: 40px; color: gold;
            animation: floatIcon 6s linear infinite;
        }
        @keyframes floatIcon {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .load-kpk { font-size: 28px; font-weight: bold; color: white; margin: 0; letter-spacing: 2px; position: relative; }
        .load-ace { 
            font-size: 45px; font-weight: 900; color: #00ff00;
            text-shadow: 0 10px 20px rgba(0,255,0,0.5);
            margin: 5px 0; transform: perspective(500px) rotateX(15deg);
            filter: drop-shadow(0 0 10px #00ff00); position: relative;
        }
        .load-yr { font-size: 24px; color: var(--blue); letter-spacing: 8px; margin-bottom: 30px; font-weight: bold; position: relative; }
        .load-bar-box { width: 260px; height: 8px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #444; position: relative; }
        .load-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), #fff); box-shadow: 0 0 15px var(--gold); transition: 0.1s; }

        .card.win-glow {
            box-shadow: 0 0 20px gold, inset 0 0 15px orange;
            border: 2px solid white; z-index: 10;
            transform: scale(1.05); transition: 0.3s;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 20000; text-align: center;
        }
        .history-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 70%; background: #111; border: 2px solid var(--gold);
            z-index: 30000; display: none; flex-direction: column; padding: 10px; border-radius: 10px;
        }
        .history-list { overflow-y: auto; flex-grow: 1; margin-top: 10px; }
        .history-item { border-bottom: 1px solid #333; padding: 5px; font-size: 12px; display: flex; justify-content: space-between; }

        .big-text { font-size: 40px; color: var(--gold); font-weight: 900; text-shadow: 0 0 20px var(--gold); margin: 20px; }
        .action-btn { background: var(--gold); color: black; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; }

        @keyframes fallIn {
            0% { transform: translateY(-150px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .card { 
            height: 60px; background: #fff; border-radius: 5px; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: #000; font-weight: bold; font-size: 18px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
            animation: fallIn 0.4s ease-out backwards; cursor: pointer;
        }
        .starker { background: radial-gradient(circle, #fff, #ff9900) !important; border: 2px solid gold; font-size: 10px; }

        .game-container { 
            width: 385px; border: 3px solid var(--gold); border-radius: 15px; 
            background: #111; position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .header-section { background: #000; border-bottom: 2px solid var(--gold); padding: 5px; text-align: center; position: relative; z-index: 2; }
        .back-btn { position: absolute; top: 5px; right: 10px; background: #ff0000; color: #fff; border: 1px solid #fff; border-radius: 8px; padding: 5px 12px; font-weight: bold; cursor: pointer; }
        
        header { display: flex; justify-content: space-between; padding: 10px 15px; background: #1a1a1a; border-bottom: 1px solid #333; z-index: 2; }
        .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #00332a; padding: 10px; margin: 10px; border-radius: 10px; position: relative; z-index: 2; }
        .reel { display: flex; flex-direction: column; gap: 8px; }

        .bet-controls { background: #000; padding: 8px; display: flex; justify-content: center; align-items: center; gap: 8px; border-top: 1px solid #333; z-index: 2; }
        .bet-btn { background: #222; color: white; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .spin-area { background: #000; padding: 10px; display: flex; justify-content: space-around; align-items: center; z-index: 2; }
        #spin-btn { width: 85px; height: 85px; border-radius: 50%; border: none; background: radial-gradient(circle, #ffcc00, #ff8800); font-weight: 900; cursor: pointer; font-size: 18px; box-shadow: 0 4px 15px rgba(255,136,0,0.4); }
        
        #auto-btn { background: #333; color: white; border: 2px solid #555; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        #auto-btn.active { background: #ff0000; border-color: #fff; color: #fff; box-shadow: 0 0 10px #ff0000; }
        .history-toggle { background: var(--blue); color: #000; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">

<div id="loading-screen">
    <div class="load-bg-icons" id="loadBgIcons"></div>
    <p class="load-kpk">KPK WIN</p>
    <p class="load-ace">SUPER ACE</p>
    <p class="load-yr">Y---R</p>
    <div class="load-bar-box"><div class="load-fill" id="loadFill"></div></div>
    <div id="loadPerc" style="font-size:12px; color:#888;">0%</div>
    <div class="load-credit">CREATED BY YASIR SAWAB</div>
</div>

<div id="fs-start-overlay" class="overlay">
    <div class="big-text">CONGRATULATIONS!<br>8 FREE SPINS</div>
    <button class="action-btn" onclick="closeOverlay('fs-start-overlay')">START FREE SPINS</button>
</div>

<div id="win-result-overlay" class="overlay">
    <div style="font-size: 24px; color: white;">TOTAL WINNING</div>
    <div id="total-win-display" class="big-text">Rs 0.00</div>
    <button id="continue-btn" class="action-btn" style="display:none;" onclick="backToNormal()">CONTINUE</button>
</div>

<div id="info-overlay" class="overlay" onclick="closeOverlay('info-overlay')">
    <div style="background:#222; padding:20px; border-radius:15px; border:2px solid gold;">
        <h2 id="info-title" style="color:gold;">ICON INFO</h2>
        <div id="info-content" style="font-size:18px; line-height:1.6;"></div>
    </div>
</div>

<div id="history-panel" class="history-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid gold; padding-bottom:5px;">
        <span style="color:gold; font-weight:bold;">BET HISTORY</span>
        <button onclick="closeOverlay('history-panel')" style="background:red; color:white; border:none; border-radius:5px;">X</button>
    </div>
    <div class="history-list" id="history-list"></div>
</div>

<div class="game-container">
    <div class="header-section">
        <button class="back-btn" onclick="window.location.replace('login.html')">BACK</button>
        <p style="color:var(--gold); font-weight:bold; margin:0; font-size:14px; letter-spacing: 1px;">SUPER ACE PRO</p>
    </div>

    <header>
        <div id="user-id">User</div>
        <div style="color:#00ff00; font-weight:900;">Rs <span id="user-bal">0.00</span></div>
    </header>

    <div style="padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 2;">
        <button class="history-toggle" onclick="openHistory()">📜 HISTORY</button>
        <button id="auto-btn" onclick="toggleAuto()">AUTO SPIN: OFF</button>
    </div>

    <div class="slot-grid" id="grid">
        <div class="reel" id="r0"></div>
        <div class="reel" id="r1"></div>
        <div class="reel" id="r2"></div>
        <div class="reel" id="r3"></div>
    </div>

    <div class="bet-controls">
        <button class="bet-btn" onclick="adjustBet('half')">1/2</button>
        <button class="bet-btn" onclick="adjustBet('minus')">-</button>
        <div style="text-align:center; min-width:60px;">
            <span style="font-size:10px; color:#888;">BET</span><br>
            <span id="bet-val" style="color: gold; font-weight: bold; font-size: 18px;">10</span>
        </div>
        <button class="bet-btn" onclick="adjustBet('plus')">+</button>
        <button class="bet-btn" onclick="adjustBet('double')">2x</button>
    </div>

    <div class="spin-area">
        <div style="color:gold; text-align:center; font-size:12px;">WINNING<br><span id="win-label" style="font-size:16px;">0.00</span></div>
        <button id="spin-btn">SPIN</button>
        <div style="color:var(--blue); text-align:center; font-size:12px;">FREE SPINS<br><span id="fs-label" style="font-size:16px;">0</span></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kpk-win-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = sessionStorage.getItem("currentUserId");
    if (!uid) { window.location.href = 'index.html'; }

    let userBalance = 0, currentBet = 10, freeSpins = 0, totalFsWin = 0;
    let isFsMode = false, isAutoSpin = false;

    const icons = [{n:'J', v:2, i:'🤵'}, {n:'Q', v:3, i:'👸'}, {n:'K', v:4, i:'🤴'}, {n:'A', v:5, i:'💎'}];

    function initApp() {
        const bg = document.getElementById('loadBgIcons');
        const labels = ['J', 'Q', 'K', 'A', '💎', '🤴'];
        for(let i=0; i<15; i++) {
            let d = document.createElement('div');
            d.className = 'floating-icon';
            d.innerText = labels[Math.floor(Math.random()*labels.length)];
            d.style.left = Math.random() * 100 + 'vw';
            d.style.animationDelay = Math.random() * 5 + 's';
            bg.appendChild(d);
        }

        let prg = 0;
        let t = setInterval(() => {
            prg += 2;
            document.getElementById('loadFill').style.width = prg + '%';
            document.getElementById('loadPerc').innerText = prg + '%';
            if(prg >= 100) {
                clearInterval(t);
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display='none', 500);
            }
        }, 40);

        db.ref('users/' + uid).on('value', (s) => {
            if(s.exists()){
                userBalance = parseFloat(s.val().balance || 0);
                document.getElementById('user-bal').innerText = userBalance.toFixed(2);
                document.getElementById('user-id').innerText = s.val().username || "User";
            }
        });
        initGrid();
    }

    function toggleAuto() {
        isAutoSpin = !isAutoSpin;
        let btn = document.getElementById('auto-btn');
        if(isAutoSpin) {
            btn.innerText = "AUTO SPIN: ON";
            btn.classList.add('active');
            if(!document.getElementById('spin-btn').disabled) startSpin();
        } else {
            btn.innerText = "AUTO SPIN: OFF";
            btn.classList.remove('active');
        }
    }

    function adjustBet(type) {
        if(isFsMode || freeSpins > 0 || isAutoSpin) return;
        if(type === 'plus') currentBet += 10;
        if(type === 'minus') currentBet = Math.max(10, currentBet - 10);
        if(type === 'double') currentBet *= 2;
        if(type === 'half') currentBet = Math.max(10, Math.floor(currentBet / 2));
        document.getElementById('bet-val').innerText = currentBet;
    }

    function createItem(isS = false, delay = 0) {
        let d = document.createElement('div');
        d.className = 'card';
        d.style.animationDelay = delay + 's';
        if(isS) { d.classList.add('starker'); d.innerHTML = "💰<br>STARKER"; d.dataset.name = "S"; }
        else {
            let o = icons[Math.floor(Math.random()*icons.length)];
            d.innerHTML = `<span>${o.i}</span><span>${o.n}</span>`;
            d.dataset.name = o.n; d.dataset.val = o.v;
            d.onclick = () => {
                document.getElementById('info-title').innerText = `${o.i} Paytable`;
                document.getElementById('info-content').innerHTML = `3 Icons: Rs ${(o.v * (currentBet/10) * 2).toFixed(2)}<br>4 Icons: Rs ${(o.v * (currentBet/10) * 4).toFixed(2)}`;
                document.getElementById('info-overlay').style.display = 'flex';
            };
        }
        return d;
    }

    document.getElementById('spin-btn').onclick = startSpin;

    function startSpin() {
        if (userBalance < currentBet && freeSpins === 0) {
            isAutoSpin = false;
            document.getElementById('auto-btn').innerText = "AUTO SPIN: OFF";
            document.getElementById('auto-btn').classList.remove('active');
            return alert("Balance kam hai!");
        }
        
        let btn = document.getElementById('spin-btn');
        btn.disabled = true;

        if (freeSpins > 0) {
            freeSpins--;
            document.getElementById('fs-label').innerText = freeSpins;
            isFsMode = true;
        } else {
            isFsMode = false;
            totalFsWin = 0;
            db.ref('users/' + uid + '/balance').transaction(b => (b || 0) - currentBet);
        }

        let scCount = 0;
        for(let i=0; i<4; i++) {
            let r = document.getElementById('r'+i); r.innerHTML = '';
            for(let j=0; j<4; j++) {
                // Set probability to roughly 1/100 rounds for 3 scatters
                let isS = Math.random() > 0.982; 
                if(isS) scCount++;
                r.appendChild(createItem(isS, (i * 0.1) + (j * 0.05)));
            }
        }

        setTimeout(() => {
            // Free Spin condition: 3 or more scatters anywhere in the grid
            if(scCount >= 3 && !isFsMode) {
                freeSpins = 8;
                document.getElementById('fs-label').innerText = freeSpins;
                document.getElementById('fs-start-overlay').style.display = 'flex';
                btn.disabled = false;
                isAutoSpin = false; 
                document.getElementById('auto-btn').innerText = "AUTO SPIN: OFF";
                document.getElementById('auto-btn').classList.remove('active');
            } else {
                checkWin();
                btn.disabled = false;
                if(isFsMode && freeSpins === 0) {
                    showFinalWinAnimation();
                } else if(isAutoSpin && !isFsMode) {
                    setTimeout(startSpin, 1500);
                }
            }
        }, 800);
    }

    // --- UPDATED WIN LOGIC WITH 80% ADMIN PROFIT (HOUSE EDGE) ---
    function checkWin() {
        let totalWin = 0;
        let grid = [];
        for(let i=0; i<4; i++) {
            let reelCards = document.querySelectorAll(`#r${i} .card`);
            let reelData = [];
            reelCards.forEach(c => reelData.push(c.dataset.name));
            grid.push(reelData);
        }

        // 80% Chance to FORCE LOSS (Admin Profit)
        let adminProfitTrigger = Math.random() < 0.80; 

        if (!adminProfitTrigger) { // Calculate win only if admin profit logic is NOT triggered
            icons.forEach(icon => {
                let name = icon.n;
                let inCol0 = grid[0].filter(x => x === name).length;
                let inCol1 = grid[1].filter(x => x === name).length;
                let inCol2 = grid[2].filter(x => x === name).length;
                let inCol3 = grid[3].filter(x => x === name).length;

                // Win logic: Starts from Reel 1 (Left-to-Right)
                if (inCol0 > 0 && inCol1 > 0 && inCol2 > 0) {
                    let ways = inCol0 * inCol1 * inCol2;
                    let multiplier = (inCol3 > 0) ? 4 : 2;
                    let winAmt = (icon.v * (currentBet / 10)) * multiplier * ways;
                    totalWin += winAmt;

                    for(let i=0; i<(inCol3 > 0 ? 4 : 3); i++) {
                        document.querySelectorAll(`#r${i} .card`).forEach(c => {
                            if(c.dataset.name === name) c.classList.add('win-glow');
                        });
                    }
                }
            });
        }

        if(totalWin > 0) {
            if(isFsMode) totalFsWin += totalWin;
            db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + totalWin);
            document.getElementById('win-label').innerText = totalWin.toFixed(2);
            addToHistory(currentBet, totalWin);
        } else {
            document.getElementById('win-label').innerText = "0.00";
            addToHistory(currentBet, 0);
        }
    }

    function addToHistory(betAmt, winAmt) {
        let list = document.getElementById('history-list');
        let item = document.createElement('div');
        item.className = 'history-item';
        let status = winAmt > 0 ? `<span style="color:#00ff00;">WIN: ${winAmt.toFixed(2)}</span>` : `<span style="color:#ff4444;">LOSS</span>`;
        item.innerHTML = `<span>Bet: ${betAmt}</span> ${status} <span>${new Date().toLocaleTimeString()}</span>`;
        list.prepend(item);
    }

    function openHistory() { document.getElementById('history-panel').style.display = 'flex'; }
    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

    function showFinalWinAnimation() {
        let overlay = document.getElementById('win-result-overlay');
        overlay.style.display = 'flex';
        let curr = 0;
        let timer = setInterval(() => {
            curr += (totalFsWin / 30);
            if(curr >= totalFsWin) { curr = totalFsWin; clearInterval(timer); document.getElementById('continue-btn').style.display = 'block'; }
            document.getElementById('total-win-display').innerText = "Rs " + curr.toFixed(2);
        }, 50);
    }

    function backToNormal() {
        closeOverlay('win-result-overlay');
        isFsMode = false;
        if(isAutoSpin) setTimeout(startSpin, 1000);
    }

    function initGrid() {
        for(let i=0; i<4; i++) { 
            let r = document.getElementById('r'+i);
            for(let j=0; j<4; j++) r.appendChild(createItem()); 
        }
    }
</script>
</body>
</html>
